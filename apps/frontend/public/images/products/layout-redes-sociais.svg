<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1145;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#2a1a5e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b1850;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c81a7f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b1850;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0,0,0,0.5)"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="avatarClip"><circle cx="80" cy="214" r="28"/></clipPath>
    <clipPath id="igAvatarClip"><circle cx="80" cy="318" r="28"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="730" cy="70" r="110" fill="none" stroke="rgba(200,26,127,0.15)" stroke-width="2"/>
  <circle cx="730" cy="70" r="70" fill="none" stroke="rgba(200,26,127,0.1)" stroke-width="1"/>
  <circle cx="70" cy="400" r="90" fill="none" stroke="rgba(59,130,246,0.1)" stroke-width="2"/>

  <!-- Title area -->
  <text x="50" y="48" font-family="system-ui,sans-serif" font-size="22" fill="#ffffff" font-weight="700">Layout de Redes Sociais</text>
  <text x="50" y="70" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">Capa e perfil em alta definição para até 3 redes sociais</text>

  <!-- ── LinkedIn Card ────────────────────── -->
  <rect x="44" y="90" width="340" height="148" rx="0" fill="rgba(10,102,194,0.15)" stroke="rgba(10,102,194,0.4)" stroke-width="1" filter="url(#shadow)"/>
  <!-- Cover photo area -->
  <rect x="44" y="90" width="340" height="70" rx="0" fill="rgba(10,102,194,0.35)"/>
  <!-- LinkedIn brand stripes -->
  <rect x="44" y="90" width="340" height="6" fill="rgba(10,102,194,0.6)"/>
  <text x="64" y="132" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="2">LINKEDIN — CAPA 1584×396px</text>
  <!-- Avatar circle -->
  <circle cx="80" cy="175" r="28" fill="#1e1145" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="80" cy="175" r="18" fill="url(#blueGrad)"/>
  <text x="80" y="181" font-family="system-ui,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">LI</text>
  <!-- Profile info lines -->
  <rect x="118" y="162" width="130" height="10" rx="5" fill="rgba(255,255,255,0.7)"/>
  <rect x="118" y="178" width="90" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="118" y="192" width="110" height="7" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Connect button -->
  <rect x="308" y="165" width="62" height="24" rx="12" fill="url(#blueGrad)" stroke="none"/>
  <text x="339" y="181" font-family="system-ui,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">Conectar</text>
  <!-- Label -->
  <text x="224" y="228" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">LinkedIn · perfil + capa</text>

  <!-- ── Instagram Card ───────────────────── -->
  <rect x="44" y="248" width="340" height="148" rx="0" fill="rgba(200,26,127,0.1)" stroke="rgba(200,26,127,0.3)" stroke-width="1" filter="url(#shadow)"/>
  <!-- IG cover gradient bar -->
  <rect x="44" y="248" width="340" height="6" fill="url(#cardGrad)"/>
  <!-- Avatar circle IG -->
  <circle cx="80" cy="309" r="28" fill="#1e1145" stroke="url(#cardGrad)" stroke-width="2.5"/>
  <circle cx="80" cy="309" r="18" fill="url(#cardGrad)"/>
  <text x="80" y="315" font-family="system-ui,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">IG</text>
  <!-- Profile info lines -->
  <rect x="118" y="296" width="120" height="10" rx="5" fill="rgba(255,255,255,0.7)"/>
  <rect x="118" y="312" width="85" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="118" y="326" width="105" height="7" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Follow button -->
  <rect x="305" y="300" width="65" height="24" rx="12" fill="url(#cardGrad)"/>
  <text x="337" y="316" font-family="system-ui,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">Seguir</text>
  <!-- Stats row -->
  <text x="80" y="368" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">248</text>
  <text x="80" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">posts</text>
  <text x="160" y="368" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">12,4K</text>
  <text x="160" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">seguidores</text>
  <text x="240" y="368" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">318</text>
  <text x="240" y="382" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">seguindo</text>
  <!-- Label -->
  <text x="224" y="396" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Instagram · perfil + foto</text>

  <!-- ── Right panel: platform specs ──────── -->
  <rect x="410" y="90" width="345" height="310" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <text x="430" y="118" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1.5">ESPECIFICAÇÕES DE ENTREGA</text>

  <!-- Spec row 1 -->
  <rect x="430" y="128" width="305" height="52" rx="8" fill="rgba(10,102,194,0.12)" stroke="rgba(10,102,194,0.25)" stroke-width="1"/>
  <rect x="430" y="128" width="4" height="52" rx="2" fill="url(#blueGrad)"/>
  <text x="444" y="150" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="600">LinkedIn</text>
  <text x="444" y="168" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Capa 1584×396px · Foto perfil 400×400px</text>

  <!-- Spec row 2 -->
  <rect x="430" y="190" width="305" height="52" rx="8" fill="rgba(200,26,127,0.12)" stroke="rgba(200,26,127,0.25)" stroke-width="1"/>
  <rect x="430" y="190" width="4" height="52" rx="2" fill="url(#cardGrad)"/>
  <text x="444" y="212" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="600">Instagram</text>
  <text x="444" y="230" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Foto perfil 320×320px · Bio cover</text>

  <!-- Spec row 3 -->
  <rect x="430" y="252" width="305" height="52" rx="8" fill="rgba(29,161,242,0.12)" stroke="rgba(29,161,242,0.25)" stroke-width="1"/>
  <rect x="430" y="252" width="4" height="52" rx="2" fill="#1da1f2"/>
  <text x="444" y="274" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="600">Facebook</text>
  <text x="444" y="292" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Capa 820×312px · Foto perfil 180×180px</text>

  <!-- Spec row 4 -->
  <rect x="430" y="314" width="305" height="52" rx="8" fill="rgba(255,0,0,0.08)" stroke="rgba(255,0,0,0.2)" stroke-width="1"/>
  <rect x="430" y="314" width="4" height="52" rx="2" fill="#ff0000"/>
  <text x="444" y="336" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="600">YouTube</text>
  <text x="444" y="354" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Arte canal 2560×1440px · Thumb 1280×720px</text>

  <!-- Bottom bar -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <rect x="50" y="414" width="100" height="22" rx="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="100" y="429" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Alta definição</text>
  <rect x="162" y="414" width="80" height="22" rx="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="202" y="429" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">2 dias úteis</text>
  <rect x="254" y="414" width="100" height="22" rx="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="304" y="429" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Arquivo aberto</text>
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="end">Layout de Redes Sociais — allka</text>
</svg>
