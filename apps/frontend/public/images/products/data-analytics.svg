<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#0c2040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#112b55;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="700" cy="75" r="140" fill="none" stroke="rgba(34,211,238,0.08)" stroke-width="2"/>
  <circle cx="700" cy="75" r="90" fill="none" stroke="rgba(168,85,247,0.06)" stroke-width="1.5"/>
  <circle cx="100" cy="400" r="110" fill="none" stroke="rgba(34,211,238,0.05)" stroke-width="2"/>

  <!-- ── GTM Container panel ────────────────────────── -->
  <rect x="30" y="65" width="420" height="310" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(34,211,238,0.15)" stroke-width="1" filter="url(#shadow)"/>

  <!-- Panel header -->
  <rect x="30" y="65" width="420" height="44" rx="14" fill="rgba(34,211,238,0.1)"/>
  <rect x="30" y="87" width="420" height="22" fill="rgba(34,211,238,0.1)"/>
  <!-- GTM icon dot -->
  <rect x="48" y="78" width="20" height="20" rx="4" fill="rgba(34,211,238,0.3)" stroke="rgba(34,211,238,0.5)" stroke-width="1"/>
  <text x="58" y="92" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle" font-weight="700">GT</text>
  <text x="78" y="92" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="600">Google Tag Manager</text>
  <text x="420" y="92" font-family="system-ui,sans-serif" font-size="10" fill="#22d3ee" text-anchor="end">● Publicado</text>

  <!-- Tags list -->
  <text x="50" y="134" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" font-weight="600" letter-spacing="0.8">TAGS CONFIGURADAS</text>

  <!-- Tag row 1 — GA4 -->
  <rect x="42" y="144" width="396" height="34" rx="6" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <rect x="52" y="153" width="6" height="16" rx="3" fill="#22d3ee"/>
  <text x="68" y="165" font-family="monospace" font-size="11" fill="#22d3ee">Google Analytics 4</text>
  <text x="300" y="165" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Página · Eventos</text>
  <rect x="400" y="152" width="30" height="16" rx="4" fill="rgba(34,211,238,0.2)"/>
  <text x="415" y="163" font-family="system-ui,sans-serif" font-size="9" fill="#22d3ee" text-anchor="middle">Ativo</text>

  <!-- Tag row 2 — Meta Pixel -->
  <rect x="42" y="184" width="396" height="34" rx="6" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <rect x="52" y="193" width="6" height="16" rx="3" fill="#3b82f6"/>
  <text x="68" y="205" font-family="monospace" font-size="11" fill="#60a5fa">Meta Pixel (Facebook Ads)</text>
  <text x="300" y="205" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">PageView · Leads</text>
  <rect x="400" y="192" width="30" height="16" rx="4" fill="rgba(59,130,246,0.2)"/>
  <text x="415" y="203" font-family="system-ui,sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">Ativo</text>

  <!-- Tag row 3 — Google Ads -->
  <rect x="42" y="224" width="396" height="34" rx="6" fill="rgba(251,191,36,0.06)" stroke="rgba(251,191,36,0.15)" stroke-width="1"/>
  <rect x="52" y="233" width="6" height="16" rx="3" fill="#fbbf24"/>
  <text x="68" y="245" font-family="monospace" font-size="11" fill="#fbbf24">Google Ads — Conversão</text>
  <text x="300" y="245" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Formulário</text>
  <rect x="400" y="232" width="30" height="16" rx="4" fill="rgba(251,191,36,0.2)"/>
  <text x="415" y="243" font-family="system-ui,sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Ativo</text>

  <!-- Tag row 4 — TikTok -->
  <rect x="42" y="264" width="396" height="34" rx="6" fill="rgba(168,85,247,0.06)" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <rect x="52" y="273" width="6" height="16" rx="3" fill="#a855f7"/>
  <text x="68" y="285" font-family="monospace" font-size="11" fill="#c084fc">TikTok Pixel</text>
  <text x="300" y="285" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">PageView</text>
  <rect x="400" y="272" width="30" height="16" rx="4" fill="rgba(168,85,247,0.2)"/>
  <text x="415" y="283" font-family="system-ui,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">Ativo</text>

  <!-- Tag row 5 — LinkedIn -->
  <rect x="42" y="304" width="396" height="34" rx="6" fill="rgba(14,165,233,0.06)" stroke="rgba(14,165,233,0.15)" stroke-width="1"/>
  <rect x="52" y="313" width="6" height="16" rx="3" fill="#0ea5e9"/>
  <text x="68" y="325" font-family="monospace" font-size="11" fill="#38bdf8">LinkedIn Insight Tag</text>
  <text x="300" y="325" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">PageView</text>
  <rect x="400" y="312" width="30" height="16" rx="4" fill="rgba(14,165,233,0.2)"/>
  <text x="415" y="323" font-family="system-ui,sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle">Ativo</text>

  <!-- Publish status bar -->
  <rect x="42" y="348" width="396" height="18" rx="6" fill="rgba(34,211,238,0.1)"/>
  <text x="240" y="361" font-family="system-ui,sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle" font-weight="600">✓ Contêiner publicado — versão 7</text>

  <!-- ── Side panel — stats ──────────────────────────── -->
  <rect x="470" y="65" width="300" height="310" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>

  <!-- GA4 realtime -->
  <text x="490" y="100" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" font-weight="600" letter-spacing="0.8">GA4 — TEMPO REAL</text>
  <text x="490" y="136" font-family="system-ui,sans-serif" font-size="40" fill="#22d3ee" font-weight="800" filter="url(#glow)">24</text>
  <text x="540" y="128" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">usuários</text>
  <text x="540" y="144" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">ativos agora</text>
  <!-- Active dot -->
  <circle cx="762" cy="100" r="5" fill="#34a853"/>
  <circle cx="762" cy="100" r="8" fill="none" stroke="#34a853" stroke-width="1" opacity="0.5"/>
  <text x="750" y="103" font-family="system-ui,sans-serif" font-size="9" fill="#34a853" text-anchor="end">ao vivo</text>

  <line x1="490" y1="155" x2="750" y2="155" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Mini stats -->
  <text x="490" y="178" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" font-weight="600">EVENTOS — ÚLTIMAS 24H</text>

  <rect x="490" y="188" width="250" height="24" rx="4" fill="rgba(34,211,238,0.07)"/>
  <text x="500" y="204" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">page_view</text>
  <text x="735" y="204" font-family="system-ui,sans-serif" font-size="11" fill="#22d3ee" text-anchor="end" font-weight="700">1.247</text>

  <rect x="490" y="216" width="250" height="24" rx="4" fill="rgba(59,130,246,0.07)"/>
  <text x="500" y="232" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">form_submit</text>
  <text x="735" y="232" font-family="system-ui,sans-serif" font-size="11" fill="#60a5fa" text-anchor="end" font-weight="700">38</text>

  <rect x="490" y="244" width="250" height="24" rx="4" fill="rgba(251,191,36,0.07)"/>
  <text x="500" y="260" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">click — whatsapp</text>
  <text x="735" y="260" font-family="system-ui,sans-serif" font-size="11" fill="#fbbf24" text-anchor="end" font-weight="700">72</text>

  <rect x="490" y="272" width="250" height="24" rx="4" fill="rgba(168,85,247,0.07)"/>
  <text x="500" y="288" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">purchase</text>
  <text x="735" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#c084fc" text-anchor="end" font-weight="700">14</text>

  <line x1="490" y1="308" x2="750" y2="308" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Tag assistant status -->
  <text x="490" y="330" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" font-weight="600">TAG ASSISTANT</text>
  <rect x="490" y="340" width="250" height="24" rx="6" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="615" y="356" font-family="system-ui,sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle" font-weight="700">✓ 5/5 tags disparando corretamente</text>

  <!-- Bottom label -->
  <text x="400" y="430" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.25)" text-anchor="end">Configuração de Data Analytics · allka</text>
</svg>
