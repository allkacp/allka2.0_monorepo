<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1145;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c81a7f"/>
      <stop offset="100%" style="stop-color:#7b1850"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Title -->
  <text x="50" y="48" font-family="system-ui,sans-serif" font-size="22" fill="#ffffff" font-weight="700">Criativos Mídia Display Estático</text>
  <text x="50" y="70" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">Painel de aprovação de campanha</text>

  <!-- Campaign approval panel -->
  <rect x="44" y="88" width="712" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="70" y="116" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" font-weight="600">Campanha: Lançamento de Produto — Primavera 2026</text>
  <rect x="560" y="100" width="90" height="26" rx="13" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.35)" stroke-width="1"/>
  <text x="605" y="117" font-family="system-ui,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="600">✓ Entregue</text>
  <text x="680" y="116" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">3 dias úteis</text>

  <!-- Banner rows with approval status -->
  <!-- Row 1 -->
  <rect x="44" y="162" width="712" height="52" rx="8" fill="rgba(74,222,128,0.06)" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <rect x="44" y="162" width="160" height="52" rx="8" fill="rgba(200,26,127,0.2)"/>
  <text x="124" y="191" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Leaderboard</text>
  <text x="230" y="191" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">728 × 90 px</text>
  <text x="430" y="191" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">.psd + .png incluídos</text>
  <rect x="628" y="175" width="100" height="26" rx="13" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  <text x="678" y="191" font-family="system-ui,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="600">Aprovado</text>

  <!-- Row 2 -->
  <rect x="44" y="224" width="712" height="52" rx="8" fill="rgba(74,222,128,0.06)" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <rect x="44" y="224" width="160" height="52" rx="8" fill="rgba(59,130,246,0.25)"/>
  <text x="124" y="253" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Medium Rect.</text>
  <text x="230" y="253" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">300 × 250 px</text>
  <text x="430" y="253" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">.psd + .png incluídos</text>
  <rect x="628" y="237" width="100" height="26" rx="13" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  <text x="678" y="253" font-family="system-ui,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="600">Aprovado</text>

  <!-- Row 3 -->
  <rect x="44" y="286" width="712" height="52" rx="8" fill="rgba(74,222,128,0.06)" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <rect x="44" y="286" width="160" height="52" rx="8" fill="rgba(139,92,246,0.25)"/>
  <text x="124" y="315" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Half Page</text>
  <text x="230" y="315" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">300 × 600 px</text>
  <text x="430" y="315" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">.psd + .png incluídos</text>
  <rect x="628" y="299" width="100" height="26" rx="13" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  <text x="678" y="315" font-family="system-ui,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="600">Aprovado</text>

  <!-- Row 4 -->
  <rect x="44" y="348" width="712" height="32" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="70" y="368" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">+ formatos adicionais conforme briefing</text>
  <text x="728" y="368" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="end">entregues em .zip</text>

  <!-- Bottom bar -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="end">Criativos Display Estático — allka</text>
</svg>
