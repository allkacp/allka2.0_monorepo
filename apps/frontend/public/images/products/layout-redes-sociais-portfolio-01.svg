<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1145;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b1850;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c81a7f"/>
      <stop offset="100%" style="stop-color:#7b1850"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0,0,0,0.5)"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="720" cy="80" r="100" fill="none" stroke="rgba(200,26,127,0.12)" stroke-width="2"/>
  <circle cx="80" cy="390" r="80" fill="none" stroke="rgba(59,130,246,0.1)" stroke-width="2"/>

  <!-- Title -->
  <text x="50" y="48" font-family="system-ui,sans-serif" font-size="22" fill="#ffffff" font-weight="700">Layout de Redes Sociais</text>
  <text x="50" y="70" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">Mockup de capa — Facebook</text>

  <!-- Facebook cover mockup -->
  <rect x="44" y="88" width="500" height="220" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#shadow)"/>
  <!-- Cover image area with gradient -->
  <rect x="44" y="88" width="500" height="150" rx="8" fill="rgba(59,130,246,0.2)"/>
  <linearGradient id="coverG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:0.5"/>
    <stop offset="100%" style="stop-color:#c81a7f;stop-opacity:0.5"/>
  </linearGradient>
  <rect x="44" y="88" width="500" height="150" fill="url(#coverG)"/>
  <!-- Cover text placeholder -->
  <rect x="120" y="118" width="220" height="16" rx="8" fill="rgba(255,255,255,0.35)"/>
  <rect x="120" y="144" width="160" height="10" rx="5" fill="rgba(255,255,255,0.2)"/>
  <!-- Profile pic area -->
  <circle cx="104" cy="238" r="38" fill="#1e1145" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <circle cx="104" cy="238" r="24" fill="url(#pink)"/>
  <text x="104" y="244" font-family="system-ui,sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">FB</text>
  <!-- Name + location -->
  <rect x="158" y="224" width="140" height="12" rx="6" fill="rgba(255,255,255,0.7)"/>
  <rect x="158" y="244" width="100" height="9" rx="4" fill="rgba(255,255,255,0.3)"/>
  <!-- Like/Follow buttons -->
  <rect x="390" y="225" width="70" height="26" rx="13" fill="url(#blue)"/>
  <text x="425" y="242" font-family="system-ui,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">Curtir</text>
  <rect x="470" y="225" width="70" height="26" rx="13" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="505" y="242" font-family="system-ui,sans-serif" font-size="10" fill="#fff" text-anchor="middle">Seguir</text>
  <text x="294" y="302" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Facebook · Capa 820×312px + Perfil 180×180px</text>

  <!-- Right panel — delivery details -->
  <rect x="565" y="88" width="195" height="220" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <text x="580" y="112" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1.5">ENTREGA</text>
  <rect x="580" y="122" width="165" height="1" fill="rgba(255,255,255,0.08)"/>
  <!-- Checkmarks -->
  <circle cx="594" cy="144" r="8" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  <text x="594" y="148" font-family="system-ui,sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="610" y="148" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">.PSD editável</text>

  <circle cx="594" cy="168" r="8" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  <text x="594" y="172" font-family="system-ui,sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="610" y="172" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">.PNG final</text>

  <circle cx="594" cy="192" r="8" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  <text x="594" y="196" font-family="system-ui,sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="610" y="196" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Mockup</text>

  <circle cx="594" cy="216" r="8" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  <text x="594" y="220" font-family="system-ui,sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="610" y="220" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Alta resolução</text>

  <circle cx="594" cy="240" r="8" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
  <text x="594" y="244" font-family="system-ui,sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="610" y="244" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">3 redes sociais</text>

  <rect x="580" y="272" width="165" height="28" rx="10" fill="url(#pink)"/>
  <text x="662" y="291" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">2 dias úteis</text>

  <!-- Bottom thumbnails -->
  <text x="50" y="330" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1">OUTRAS REDES</text>
  <rect x="44" y="342" width="155" height="70" rx="8" fill="rgba(10,102,194,0.2)" stroke="rgba(10,102,194,0.3)" stroke-width="1"/>
  <text x="121" y="382" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">LinkedIn</text>
  <rect x="210" y="342" width="155" height="70" rx="8" fill="rgba(200,26,127,0.2)" stroke="rgba(200,26,127,0.3)" stroke-width="1"/>
  <text x="287" y="382" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">Instagram</text>
  <rect x="376" y="342" width="155" height="70" rx="8" fill="rgba(255,0,0,0.15)" stroke="rgba(255,0,0,0.2)" stroke-width="1"/>
  <text x="453" y="382" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="600">YouTube</text>

  <!-- Bottom bar -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="end">Layout de Redes Sociais — allka</text>
</svg>
