  <text x="38" y="242" font-family="system-ui,sans-serif" font-size="11" fill="rgba(74,222,128,0.85)">+</text>
  <text x="54" y="242" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">Adaptado a sua marca</text>
  <text x="38" y="262" font-family="system-ui,sans-serif" font-size="11" fill="rgba(74,222,128,0.85)">+</text>
  <text x="54" y="262" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">5 formatos diferentes</text>
