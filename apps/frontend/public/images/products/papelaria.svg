<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3e;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#1a2a5e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d1a5e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <linearGradient id="light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.6)"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="700" cy="70" r="120" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="2"/>
  <circle cx="700" cy="70" r="80" fill="none" stroke="rgba(201,168,76,0.07)" stroke-width="1.5"/>
  <circle cx="100" cy="400" r="90" fill="none" stroke="rgba(124,58,237,0.1)" stroke-width="2"/>

  <!-- Paper timbrado (main document, slightly tilted left) -->
  <g transform="rotate(-4, 400, 225)" filter="url(#shadow)">
    <rect x="195" y="80" width="210" height="280" rx="4" fill="#f8f6f0"/>
    <!-- header strip -->
    <rect x="195" y="80" width="210" height="42" rx="4" fill="url(#gold)"/>
    <rect x="195" y="108" width="210" height="14" rx="0" fill="url(#gold)"/>
    <!-- logo placeholder line -->
    <rect x="210" y="90" width="80" height="8" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="210" y="102" width="50" height="4" rx="1" fill="rgba(255,255,255,0.5)"/>
    <!-- content lines -->
    <rect x="210" y="138" width="170" height="5" rx="2" fill="#d4cfc0"/>
    <rect x="210" y="150" width="155" height="4" rx="2" fill="#d4cfc0"/>
    <rect x="210" y="162" width="165" height="4" rx="2" fill="#d4cfc0"/>
    <rect x="210" y="180" width="170" height="4" rx="2" fill="#d4cfc0"/>
    <rect x="210" y="192" width="140" height="4" rx="2" fill="#d4cfc0"/>
    <rect x="210" y="204" width="158" height="4" rx="2" fill="#d4cfc0"/>
    <rect x="210" y="222" width="170" height="4" rx="2" fill="#d4cfc0"/>
    <rect x="210" y="234" width="130" height="4" rx="2" fill="#d4cfc0"/>
    <rect x="210" y="246" width="162" height="4" rx="2" fill="#d4cfc0"/>
    <rect x="210" y="264" width="170" height="4" rx="2" fill="#d4cfc0"/>
    <rect x="210" y="276" width="145" height="4" rx="2" fill="#d4cfc0"/>
    <!-- footer strip -->
    <rect x="195" y="332" width="210" height="28" rx="0" fill="#2c2c2c" opacity="0.85"/>
    <rect x="210" y="340" width="80" height="3" rx="1" fill="rgba(201,168,76,0.7)"/>
    <rect x="210" y="347" width="110" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Business card (front, slightly tilted right, on top right) -->
  <g transform="rotate(6, 540, 200)" filter="url(#shadow)">
    <rect x="470" y="130" width="140" height="82" rx="5" fill="#1a1a1a"/>
    <!-- gold accent line -->
    <rect x="470" y="130" width="140" height="4" rx="2" fill="url(#gold)"/>
    <!-- logo/name -->
    <rect x="484" y="145" width="60" height="7" rx="2" fill="rgba(201,168,76,0.9)"/>
    <rect x="484" y="156" width="40" height="4" rx="1" fill="rgba(255,255,255,0.4)"/>
    <!-- contact lines -->
    <rect x="484" y="172" width="90" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
    <rect x="484" y="179" width="78" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
    <rect x="484" y="186" width="85" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
    <!-- small circle accent -->
    <circle cx="592" cy="164" r="12" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  </g>

  <!-- Business card (back) -->
  <g transform="rotate(6, 540, 320)" filter="url(#shadow)">
    <rect x="470" y="260" width="140" height="82" rx="5" fill="url(#gold)"/>
    <!-- pattern overlay -->
    <rect x="470" y="260" width="140" height="82" rx="5" fill="rgba(0,0,0,0.1)"/>
    <!-- centered text placeholder -->
    <rect x="510" y="290" width="60" height="6" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="520" y="300" width="40" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>
    <!-- subtle diagonal lines -->
    <line x1="470" y1="260" x2="610" y2="342" stroke="rgba(255,255,255,0.05)" stroke-width="8"/>
    <line x1="470" y1="280" x2="610" y2="342" stroke="rgba(255,255,255,0.04)" stroke-width="8"/>
  </g>

  <!-- Notepad / bloco de notas (left, behind) -->
  <g transform="rotate(3, 200, 240)" opacity="0.85" filter="url(#shadow)">
    <rect x="60" y="120" width="155" height="200" rx="3" fill="#fffef8"/>
    <!-- spiral holes row -->
    <g fill="none" stroke="#bbb" stroke-width="1.5">
      <circle cx="75" cy="128" r="4"/>
      <circle cx="95" cy="128" r="4"/>
      <circle cx="115" cy="128" r="4"/>
      <circle cx="135" cy="128" r="4"/>
      <circle cx="155" cy="128" r="4"/>
      <circle cx="175" cy="128" r="4"/>
      <circle cx="195" cy="128" r="4"/>
    </g>
    <!-- ruled lines -->
    <rect x="72" y="142" width="130" height="3" rx="1" fill="#e0ddd5"/>
    <rect x="72" y="152" width="120" height="3" rx="1" fill="#e0ddd5"/>
    <rect x="72" y="162" width="128" height="3" rx="1" fill="#e0ddd5"/>
    <rect x="72" y="172" width="115" height="3" rx="1" fill="#e0ddd5"/>
    <rect x="72" y="182" width="126" height="3" rx="1" fill="#e0ddd5"/>
    <rect x="72" y="192" width="118" height="3" rx="1" fill="#e0ddd5"/>
    <rect x="72" y="202" width="130" height="3" rx="1" fill="#e0ddd5"/>
    <rect x="72" y="212" width="108" height="3" rx="1" fill="#e0ddd5"/>
    <rect x="72" y="222" width="124" height="3" rx="1" fill="#e0ddd5"/>
    <!-- left margin line -->
    <line x1="84" y1="138" x2="84" y2="310" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
    <!-- brand bar top -->
    <rect x="60" y="120" width="155" height="16" rx="3" fill="url(#light)" opacity="0.9"/>
    <rect x="72" y="125" width="50" height="4" rx="1" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- Text: "Design e Criação" label -->
  <text x="400" y="418" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="rgba(201,168,76,0.7)" letter-spacing="3" font-weight="500">DESIGN E CRIAÇÃO</text>

  <!-- Product title -->
  <text x="400" y="54" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="700" letter-spacing="0.5">Papelaria</text>
  <text x="400" y="74" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(201,168,76,0.85)" font-weight="400" letter-spacing="1">3 unidades · mockup · PDF gráfica · arquivo AI</text>

  <!-- Gold accent line under title -->
  <rect x="340" y="79" width="120" height="1.5" rx="1" fill="rgba(201,168,76,0.4)"/>
</svg>
