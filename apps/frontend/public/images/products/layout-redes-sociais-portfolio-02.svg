<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1145;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c81a7f"/>
      <stop offset="100%" style="stop-color:#7b1850"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Title -->
  <text x="50" y="48" font-family="system-ui,sans-serif" font-size="22" fill="#ffffff" font-weight="700">Layout de Redes Sociais</text>
  <text x="50" y="70" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">Comparativo antes × depois</text>

  <!-- Before column -->
  <text x="160" y="100" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="2">ANTES</text>
  <rect x="44" y="110" width="232" height="260" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Generic placeholder profile -->
  <rect x="44" y="110" width="232" height="100" fill="rgba(100,100,100,0.2)"/>
  <line x1="44" y1="110" x2="276" y2="210" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="276" y1="110" x2="44" y2="210" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="90" cy="220" r="26" fill="rgba(100,100,100,0.3)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <rect x="128" y="212" width="100" height="9" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="128" y="228" width="70" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="64" y="258" width="180" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="64" y="272" width="140" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="64" y="286" width="160" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="64" y="300" width="120" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>
  <text x="160" y="345" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="middle">sem identidade visual</text>

  <!-- Arrow -->
  <text x="314" y="248" font-family="system-ui,sans-serif" font-size="28" fill="url(#pink)" text-anchor="middle">→</text>

  <!-- After column -->
  <text x="574" y="100" font-family="system-ui,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" letter-spacing="2">DEPOIS</text>
  <rect x="420" y="110" width="308" height="260" rx="10" fill="rgba(200,26,127,0.08)" stroke="rgba(200,26,127,0.25)" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Branded cover -->
  <rect x="420" y="110" width="308" height="110" rx="8" fill="none"/>
  <linearGradient id="coverAfter" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#c81a7f;stop-opacity:0.4"/>
    <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.4"/>
  </linearGradient>
  <rect x="420" y="110" width="308" height="110" fill="url(#coverAfter)"/>
  <!-- Grid pattern on cover -->
  <g opacity="0.15" stroke="#fff" stroke-width="0.5">
    <line x1="420" y1="130" x2="728" y2="130"/>
    <line x1="420" y1="150" x2="728" y2="150"/>
    <line x1="420" y1="170" x2="728" y2="170"/>
    <line x1="420" y1="190" x2="728" y2="190"/>
    <line x1="470" y1="110" x2="470" y2="220"/>
    <line x1="530" y1="110" x2="530" y2="220"/>
    <line x1="590" y1="110" x2="590" y2="220"/>
    <line x1="650" y1="110" x2="650" y2="220"/>
    <line x1="700" y1="110" x2="700" y2="220"/>
  </g>
  <!-- Brand name on cover -->
  <text x="574" y="165" font-family="system-ui,sans-serif" font-size="18" fill="#fff" text-anchor="middle" font-weight="700" opacity="0.9">BRAND NAME</text>
  <rect x="504" y="175" width="140" height="2" fill="url(#pink)" rx="1"/>
  <!-- Profile after -->
  <circle cx="468" cy="232" r="28" fill="#1e1145" stroke="url(#pink)" stroke-width="2.5"/>
  <circle cx="468" cy="232" r="18" fill="url(#pink)"/>
  <text x="468" y="238" font-family="system-ui,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">BN</text>
  <rect x="510" y="220" width="130" height="11" rx="5" fill="rgba(255,255,255,0.75)"/>
  <rect x="510" y="238" width="90" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
  <rect x="510" y="254" width="110" height="7" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="440" y="275" width="255" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="440" y="290" width="200" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="440" y="305" width="220" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="574" y="345" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">identidade visual consistente ✓</text>

  <!-- Bottom bar -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="end">Layout de Redes Sociais — allka</text>
</svg>
