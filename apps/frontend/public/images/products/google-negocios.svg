<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#0f2744;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="googleRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea4335;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c5221f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#163352;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="690" cy="70" r="140" fill="none" stroke="rgba(234,67,53,0.1)" stroke-width="2"/>
  <circle cx="690" cy="70" r="90" fill="none" stroke="rgba(251,188,4,0.07)" stroke-width="1"/>
  <circle cx="110" cy="400" r="100" fill="none" stroke="rgba(52,168,83,0.07)" stroke-width="2"/>

  <!-- ── Map panel (right side) ──────────────────────── -->
  <rect x="460" y="60" width="310" height="330" rx="14" ry="14" fill="url(#mapGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <!-- Map street lines -->
  <g opacity="0.2" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none">
    <line x1="460" y1="165" x2="770" y2="165"/>
    <line x1="460" y1="240" x2="770" y2="240"/>
    <line x1="460" y1="315" x2="770" y2="315"/>
    <line x1="555" y1="60" x2="555" y2="390"/>
    <line x1="650" y1="60" x2="650" y2="390"/>
  </g>
  <!-- Map blocks -->
  <rect x="470" y="72" width="74" height="74" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="470" y="178" width="74" height="52" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="470" y="250" width="74" height="60" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="565" y="72" width="74" height="52" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="565" y="250" width="74" height="74" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="660" y="178" width="98" height="52" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Highlighted location block -->
  <rect x="565" y="140" width="74" height="90" rx="4" fill="rgba(234,67,53,0.12)" stroke="rgba(234,67,53,0.3)" stroke-width="1.5"/>
  <!-- Map pin -->
  <circle cx="602" cy="175" r="14" fill="url(#googleRed)" filter="url(#glow)"/>
  <circle cx="602" cy="175" r="6" fill="#ffffff"/>
  <!-- Pin shadow drop -->
  <ellipse cx="602" cy="198" rx="8" ry="3" fill="rgba(0,0,0,0.3)"/>
  <!-- Map label -->
  <rect x="565" y="198" width="74" height="18" rx="4" fill="rgba(234,67,53,0.8)"/>
  <text x="602" y="211" font-family="system-ui,sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="700">SEU NEGÓCIO</text>

  <!-- ── Business Profile card ──────────────────────────── -->
  <rect x="30" y="60" width="410" height="330" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#shadow)"/>

  <!-- Profile header -->
  <rect x="30" y="60" width="410" height="80" rx="14" ry="14" fill="rgba(234,67,53,0.12)"/>
  <rect x="30" y="110" width="410" height="30" rx="0" fill="rgba(234,67,53,0.12)"/>

  <!-- Business logo/icon -->
  <rect x="50" y="78" width="52" height="52" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- G letter -->
  <text x="76" y="113" font-family="Arial,sans-serif" font-size="24" fill="#ea4335" text-anchor="middle" font-weight="800">G</text>

  <!-- Business name and category -->
  <text x="118" y="100" font-family="system-ui,sans-serif" font-size="18" fill="#ffffff" font-weight="700">Clínica Estética Lumina</text>
  <text x="118" y="122" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">Clínica de Estética · São Paulo, SP</text>

  <!-- Stars -->
  <text x="50" y="164" font-family="system-ui,sans-serif" font-size="16" fill="#fbbc04">★★★★★</text>
  <text x="148" y="164" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="700">4,9</text>
  <text x="172" y="164" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">(247 avaliações)</text>

  <!-- Divider -->
  <line x1="50" y1="178" x2="420" y2="178" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Info items -->
  <!-- Address -->
  <circle cx="62" cy="199" r="9" fill="rgba(234,67,53,0.2)"/>
  <text x="62" y="203" font-family="system-ui,sans-serif" font-size="10" fill="#ea4335" text-anchor="middle">📍</text>
  <text x="80" y="203" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">Av. Paulista, 1578 — São Paulo</text>

  <!-- Phone -->
  <circle cx="62" cy="225" r="9" fill="rgba(52,168,83,0.2)"/>
  <text x="62" y="229" font-family="system-ui,sans-serif" font-size="10" fill="#34a853" text-anchor="middle">📞</text>
  <text x="80" y="229" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">(11) 9 8765-4321</text>

  <!-- Website -->
  <circle cx="62" cy="251" r="9" fill="rgba(66,133,244,0.2)"/>
  <text x="62" y="255" font-family="system-ui,sans-serif" font-size="10" fill="#4285f4" text-anchor="middle">🌐</text>
  <text x="80" y="255" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">clinicalumina.com.br</text>

  <!-- Hours -->
  <circle cx="62" cy="277" r="9" fill="rgba(251,188,4,0.2)"/>
  <text x="62" y="281" font-family="system-ui,sans-serif" font-size="10" fill="#fbbc04" text-anchor="middle">🕐</text>
  <text x="80" y="277" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">Aberto agora · Fecha às 20h</text>

  <!-- Divider -->
  <line x1="50" y1="296" x2="420" y2="296" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Action buttons -->
  <rect x="50" y="310" width="110" height="32" rx="16" fill="rgba(66,133,244,0.25)" stroke="rgba(66,133,244,0.5)" stroke-width="1"/>
  <text x="105" y="330" font-family="system-ui,sans-serif" font-size="11" fill="#4285f4" text-anchor="middle" font-weight="600">Ligar</text>

  <rect x="175" y="310" width="110" height="32" rx="16" fill="rgba(52,168,83,0.25)" stroke="rgba(52,168,83,0.5)" stroke-width="1"/>
  <text x="230" y="330" font-family="system-ui,sans-serif" font-size="11" fill="#34a853" text-anchor="middle" font-weight="600">Rota</text>

  <rect x="300" y="310" width="120" height="32" rx="16" fill="rgba(234,67,53,0.25)" stroke="rgba(234,67,53,0.5)" stroke-width="1"/>
  <text x="360" y="330" font-family="system-ui,sans-serif" font-size="11" fill="#ea4335" text-anchor="middle" font-weight="600">Website</text>

  <!-- Bottom label -->
  <text x="400" y="430" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.25)" text-anchor="end">Configuração de Google Negócios · allka</text>
</svg>
