<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1145;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c81a7f"/>
      <stop offset="100%" style="stop-color:#7b1850"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Title -->
  <text x="50" y="48" font-family="system-ui,sans-serif" font-size="22" fill="#ffffff" font-weight="700">Criativos Mídia Display Estático</text>
  <text x="50" y="70" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">Exemplo de campanha — e-commerce</text>

  <!-- Main banner mockup: leaderboard -->
  <rect x="44" y="90" width="712" height="88" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:0.5"/>
    <stop offset="50%" style="stop-color:#c81a7f;stop-opacity:0.4"/>
    <stop offset="100%" style="stop-color:#7b1850;stop-opacity:0.4"/>
  </linearGradient>
  <rect x="44" y="90" width="712" height="88" rx="10" fill="url(#bannerBg)"/>
  <text x="90" y="127" font-family="system-ui,sans-serif" font-size="18" fill="#fff" font-weight="700">Promoção de Verão</text>
  <text x="90" y="150" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Até 50% de desconto em produtos selecionados</text>
  <rect x="590" y="106" width="140" height="36" rx="18" fill="url(#pink)"/>
  <text x="660" y="128" font-family="system-ui,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">Comprar agora</text>
  <text x="756" y="190" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">728×90px</text>

  <!-- Grid of smaller banners -->
  <!-- 300x250 -->
  <rect x="44" y="200" width="220" height="170" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#c81a7f;stop-opacity:0.3"/>
    <stop offset="100%" style="stop-color:#7b1850;stop-opacity:0.2"/>
  </linearGradient>
  <rect x="44" y="200" width="220" height="100" rx="8" fill="url(#b1)"/>
  <text x="154" y="245" font-family="system-ui,sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">-50%</text>
  <text x="154" y="264" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Só hoje</text>
  <rect x="74" y="318" width="160" height="30" rx="15" fill="url(#pink)"/>
  <text x="154" y="337" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">Ver ofertas</text>
  <text x="154" y="365" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">300×250</text>

  <!-- 160x600 skyscraper condensed -->
  <rect x="290" y="200" width="180" height="170" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1" filter="url(#shadow)"/>
  <rect x="290" y="200" width="180" height="70" rx="8" fill="rgba(59,130,246,0.25)"/>
  <text x="380" y="233" font-family="system-ui,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">Nova coleção</text>
  <text x="380" y="252" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Primavera 2026</text>
  <rect x="310" y="286" width="140" height="7" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="310" y="300" width="110" height="7" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="310" y="314" width="125" height="7" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="310" y="338" width="140" height="26" rx="13" fill="url(#blue)"/>
  <text x="380" y="355" font-family="system-ui,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">Descobrir</text>
  <text x="380" y="365" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">970×250</text>

  <!-- 970x250 billboard condensed -->
  <rect x="500" y="200" width="256" height="170" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1" filter="url(#shadow)"/>
  <rect x="500" y="200" width="256" height="6" rx="3" fill="rgba(139,92,246,0.7)"/>
  <text x="628" y="265" font-family="system-ui,sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">Flash Sale</text>
  <text x="628" y="284" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Apenas nas próximas 24h</text>
  <rect x="548" y="300" width="160" height="30" rx="15" fill="rgba(139,92,246,0.6)" stroke="rgba(139,92,246,0.8)" stroke-width="1"/>
  <text x="628" y="319" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">Aproveitar →</text>
  <text x="628" y="365" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">300×600</text>

  <!-- Bottom bar -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="end">Criativos Display Estático — allka</text>
</svg>
