  <text x="572" y="362" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">·</text>
  <text x="580" y="362" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" font-weight="600">Photoshop</text>
  <text x="644" y="362" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">·</text>
  <text x="652" y="362" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" font-weight="600">Illustrator</text>
  <text x="710" y="362" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">·</text>
  <text x="718" y="362" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" font-weight="600">AI</text>

  <text x="400" y="432" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.15)" text-anchor="middle">allka · templates para redes sociais</text>
