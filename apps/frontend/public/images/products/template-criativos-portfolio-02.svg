    </linearGradient>
    <linearGradient id="linkedin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a66c2"/><stop offset="100%" stop-color="#004080"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(0,0,0,0.7)"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
