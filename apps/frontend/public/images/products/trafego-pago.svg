<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <!-- Background gradient: deep navy → brand magenta -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f5c;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#1a2a6f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b1850;stop-opacity:1"/>
    </linearGradient>
    <!-- Glow effect for bars -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Card shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <!-- Bar accent gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c81a7f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b1850;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>

  <!-- Decorative circle accent top-right -->
  <circle cx="720" cy="60" r="120" fill="none" stroke="rgba(200,26,127,0.15)" stroke-width="2"/>
  <circle cx="720" cy="60" r="80" fill="none" stroke="rgba(200,26,127,0.1)" stroke-width="1"/>

  <!-- Decorative circle accent bottom-left -->
  <circle cx="80" cy="390" r="100" fill="none" stroke="rgba(59,130,246,0.12)" stroke-width="2"/>

  <!-- ── Chart Card ──────────────────────────────── -->
  <rect x="50" y="80" width="430" height="290" rx="16" ry="16" fill="rgba(255,255,255,0.06)" filter="url(#shadow)"/>
  <rect x="50" y="80" width="430" height="290" rx="16" ry="16" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Chart label -->
  <text x="74" y="115" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" font-weight="500" letter-spacing="1.5">PERFORMANCE DO MÊS</text>

  <!-- Bar chart — 6 bars representing campaign weeks -->
  <!-- Bar 1 -->
  <rect x="90" y="230" width="44" height="90" rx="6" ry="6" fill="url(#barGrad2)" opacity="0.7" filter="url(#glow)"/>
  <!-- Bar 2 -->
  <rect x="150" y="200" width="44" height="120" rx="6" ry="6" fill="url(#barGrad2)" opacity="0.8" filter="url(#glow)"/>
  <!-- Bar 3 -->
  <rect x="210" y="175" width="44" height="145" rx="6" ry="6" fill="url(#barGrad3)" opacity="0.85" filter="url(#glow)"/>
  <!-- Bar 4 -->
  <rect x="270" y="195" width="44" height="125" rx="6" ry="6" fill="url(#barGrad)" opacity="0.9" filter="url(#glow)"/>
  <!-- Bar 5 -->
  <rect x="330" y="155" width="44" height="165" rx="6" ry="6" fill="url(#barGrad)" filter="url(#glow)"/>
  <!-- Bar 6 -->
  <rect x="390" y="135" width="44" height="185" rx="6" ry="6" fill="url(#barGrad)" filter="url(#glow)"/>

  <!-- Trend line -->
  <polyline points="112,225 172,195 232,170 292,190 352,150 412,130" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round"/>
  <!-- Trend dots -->
  <circle cx="112" cy="225" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="172" cy="195" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="232" cy="170" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="292" cy="190" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="352" cy="150" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="412" cy="130" r="5" fill="#c81a7f"/>
  <circle cx="412" cy="130" r="8" fill="none" stroke="#c81a7f" stroke-width="2" opacity="0.6"/>

  <!-- Baseline -->
  <line x1="74" y1="320" x2="456" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Month labels -->
  <text x="104" y="338" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">Jan</text>
  <text x="164" y="338" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">Fev</text>
  <text x="224" y="338" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">Mar</text>
  <text x="284" y="338" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">Abr</text>
  <text x="344" y="338" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">Mai</text>
  <text x="404" y="338" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle" font-weight="600">Jun</text>

  <!-- ── Stat cards right ──────────────────────────────────── -->
  <!-- Card: ROAS -->
  <rect x="510" y="80" width="240" height="88" rx="12" ry="12" fill="rgba(255,255,255,0.07)" stroke="rgba(200,26,127,0.3)" stroke-width="1"/>
  <text x="530" y="110" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" letter-spacing="1">ROAS MÉDIO</text>
  <text x="530" y="142" font-family="system-ui,sans-serif" font-size="32" fill="#ffffff" font-weight="700">4.8×</text>
  <!-- Arrow up -->
  <polygon points="720,132 730,112 740,132" fill="#4ade80"/>
  <text x="714" y="155" font-family="system-ui,sans-serif" font-size="10" fill="#4ade80">+12%</text>

  <!-- Card: CAC -->
  <rect x="510" y="182" width="240" height="88" rx="12" ry="12" fill="rgba(255,255,255,0.07)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="530" y="212" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" letter-spacing="1">CAC ATUAL</text>
  <text x="530" y="244" font-family="system-ui,sans-serif" font-size="28" fill="#ffffff" font-weight="700">R$ 38</text>
  <!-- Arrow down (good) -->
  <polygon points="720,244 730,264 740,244" fill="#4ade80"/>
  <text x="714" y="238" font-family="system-ui,sans-serif" font-size="10" fill="#4ade80">-8%</text>

  <!-- Card: Conversões -->
  <rect x="510" y="284" width="240" height="88" rx="12" ry="12" fill="rgba(255,255,255,0.07)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="530" y="314" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" letter-spacing="1">CONVERSÕES/MÊS</text>
  <text x="530" y="346" font-family="system-ui,sans-serif" font-size="28" fill="#ffffff" font-weight="700">247</text>
  <polygon points="720,336 730,316 740,336" fill="#4ade80"/>
  <text x="714" y="358" font-family="system-ui,sans-serif" font-size="10" fill="#4ade80">+31%</text>

  <!-- ── Bottom bar ──────────────────────────────────── -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <!-- Platform badges -->
  <rect x="50" y="413" width="90" height="24" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="95" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-weight="500">Meta Ads</text>

  <rect x="152" y="413" width="100" height="24" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="202" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-weight="500">Google Ads</text>

  <rect x="264" y="413" width="90" height="24" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="309" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-weight="500">TikTok Ads</text>

  <!-- Product name -->
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="end" font-weight="400">Gestão de Tráfego — allka</text>

  <!-- ── Main title ──────────────────────────────────── -->
  <text x="50" y="52" font-family="system-ui, sans-serif" font-size="22" fill="#ffffff" font-weight="700">Gestão de Tráfego Pago</text>
  <text x="50" y="72" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="400">Campanhas gerenciadas por especialista certificado</text>
</svg>
