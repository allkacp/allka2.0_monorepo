services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: allka
      MYSQL_USER: allka
      MYSQL_PASSWORD: allka_dev
      MYSQL_ROOT_PASSWORD: allka_root_dev
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uallka -pallka_dev --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    working_dir: /repo/apps/backend
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: mysql://allka:allka_dev@mysql:3306/allka
      JWT_SECRET: local-development-secret
    ports:
      - "3001:3001"
    volumes:
      - ./apps/backend:/repo/apps/backend
      - ./apps/frontend/dev-mocks:/repo/apps/frontend/dev-mocks:ro
      - /repo/node_modules
      - /repo/apps/backend/node_modules
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    working_dir: /repo/apps/frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: http://localhost:3001/api
      VITE_USE_MOCKS: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./apps/frontend:/repo/apps/frontend
      - /repo/node_modules
      - /repo/apps/frontend/node_modules
    depends_on:
      - backend

volumes:
  mysql_dev_data: