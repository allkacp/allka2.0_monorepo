name: Deploy Backend

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/backend/**'
      - 'docker/backend.prod.Dockerfile'
      - 'docker-compose.prod.yml'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  FRONTEND_DOMAIN: allka.store
  API_DOMAIN: api.allka.store
  VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.allka.store/api' }}
  VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH || '/opt/allka-2026' }}
  MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE || 'allka' }}
  MYSQL_USER: ${{ secrets.MYSQL_USER || 'allka' }}
  RUN_RESET_USERS_PASSWORD: ${{ vars.RUN_RESET_USERS_PASSWORD || 'false' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: images
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::7}"
          echo "backend_image=${REGISTRY}/${repo}/backend:${short_sha}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=${REGISTRY}/${repo}/backend:dev" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${repo}/frontend:dev" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.prod.Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.backend_image }}
            ${{ steps.images.outputs.backend_latest }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Validate required deploy secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          : "${VPS_HOST:?Set the VPS_HOST secret}"
          : "${VPS_USER:?Set the VPS_USER secret}"
          : "${VPS_SSH_PORT:?Set the VPS_SSH_PORT secret}"
          : "${VPS_SSH_KEY:?Set the VPS_SSH_KEY secret}"
          : "${GHCR_PAT:?Set the GHCR_PAT secret}"
          : "${MYSQL_PASSWORD:?Set the MYSQL_PASSWORD secret}"
          : "${MYSQL_ROOT_PASSWORD:?Set the MYSQL_ROOT_PASSWORD secret}"
          : "${JWT_SECRET:?Set the JWT_SECRET secret}"

      - name: Render deploy files
        shell: bash
        env:
          BACKEND_IMAGE: ${{ steps.images.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend_image }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          mkdir -p .deploy/infra/caddy
          cp docker-compose.prod.yml .deploy/docker-compose.yml
          cp infra/caddy/Caddyfile .deploy/infra/caddy/Caddyfile

          {
            printf 'BACKEND_IMAGE=%s\n' "$BACKEND_IMAGE"
            printf 'FRONTEND_IMAGE=%s\n' "$FRONTEND_IMAGE"
            printf 'FRONTEND_DOMAIN=%s\n' "$FRONTEND_DOMAIN"
            printf 'API_DOMAIN=%s\n' "$API_DOMAIN"
            printf 'MYSQL_DATABASE=%s\n' "$MYSQL_DATABASE"
            printf 'MYSQL_USER=%s\n' "$MYSQL_USER"
            printf 'MYSQL_PASSWORD=%s\n' "$MYSQL_PASSWORD"
            printf 'MYSQL_ROOT_PASSWORD=%s\n' "$MYSQL_ROOT_PASSWORD"
          } > .deploy/.env

          {
            printf 'DATABASE_URL=mysql://%s:%s@mysql:3306/%s\n' "$MYSQL_USER" "$MYSQL_PASSWORD" "$MYSQL_DATABASE"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'PORT=3001\n'
            printf 'NODE_ENV=production\n'
            printf 'FRONTEND_URL=https://%s\n' "$FRONTEND_DOMAIN"
            printf 'CORS_ORIGIN=https://%s\n' "$FRONTEND_DOMAIN"
          } > .deploy/.env.backend

      - name: Configure SSH
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          touch ~/.ssh/allka_deploy_key
          chmod 600 ~/.ssh/allka_deploy_key
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/allka_deploy_key
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload compose files
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          VPS_HOST="$(echo -n "$VPS_HOST" | tr -d '[:space:]')"
          VPS_USER="$(echo -n "$VPS_USER" | tr -d '[:space:]')"
          VPS_SSH_PORT="$(echo -n "$VPS_SSH_PORT" | tr -d '[:space:]')"
          remote="${VPS_USER}@${VPS_HOST}"
          SSH_OPTS=(
            -i "$HOME/.ssh/allka_deploy_key"
            -p "$VPS_SSH_PORT"
            -o ConnectTimeout=15
            -o ConnectionAttempts=2
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          SCP_OPTS=(
            -i "$HOME/.ssh/allka_deploy_key"
            -P "$VPS_SSH_PORT"
            -o ConnectTimeout=15
            -o ConnectionAttempts=2
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          for i in 1 2 3; do
            if ssh "${SSH_OPTS[@]}" "$remote" "true"; then
              break
            fi
            echo "Tentativa SSH $i falhou. Aguardando 10s..."
            sleep 10
            if [ "$i" = "3" ]; then
              echo "::error::SSH inacessível em ${VPS_HOST}:${VPS_SSH_PORT}. Verifique VPS_HOST, VPS_SSH_PORT, firewall e se o serviço SSH está ativo no VPS."
              exit 1
            fi
          done
          ssh "${SSH_OPTS[@]}" "$remote" "mkdir -p '${VPS_DEPLOY_PATH}/infra/caddy'"
          scp "${SCP_OPTS[@]}" .deploy/docker-compose.yml "$remote:${VPS_DEPLOY_PATH}/docker-compose.yml"
          scp "${SCP_OPTS[@]}" .deploy/.env               "$remote:${VPS_DEPLOY_PATH}/.env"
          scp "${SCP_OPTS[@]}" .deploy/.env.backend        "$remote:${VPS_DEPLOY_PATH}/.env.backend"
          scp "${SCP_OPTS[@]}" .deploy/infra/caddy/Caddyfile "$remote:${VPS_DEPLOY_PATH}/infra/caddy/Caddyfile"

      - name: Deploy backend on VPS
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          VPS_HOST="$(echo -n "$VPS_HOST" | tr -d '[:space:]')"
          VPS_USER="$(echo -n "$VPS_USER" | tr -d '[:space:]')"
          VPS_SSH_PORT="$(echo -n "$VPS_SSH_PORT" | tr -d '[:space:]')"
          remote="${VPS_USER}@${VPS_HOST}"
          SSH_OPTS=(
            -i "$HOME/.ssh/allka_deploy_key"
            -p "$VPS_SSH_PORT"
            -o ConnectTimeout=15
            -o ConnectionAttempts=2
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          printf '%s' "$GHCR_PAT" | ssh "${SSH_OPTS[@]}" "$remote" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          ssh "${SSH_OPTS[@]}" "$remote" \
            "cd '${VPS_DEPLOY_PATH}' && \
             docker compose --env-file .env -f docker-compose.yml pull backend && \
             docker compose --env-file .env -f docker-compose.yml up -d mysql && \
             docker compose --env-file .env -f docker-compose.yml run --rm migrate && \
             docker compose --env-file .env -f docker-compose.yml up -d --no-deps backend && \
             docker compose --env-file .env -f docker-compose.yml run --rm --no-deps backend npm run db:seed:real:prod && \
             docker image prune -f"

      # ── Seed dados reais (Agency / Empresa / Líder) ────────────────────────────
      # O seed roda AUTOMÁTICO no bloco de deploy acima, logo após o migrate:
      #   npm run db:seed:real:prod  →  node prisma/seed-real.cjs
      # Script prod-safe (Node puro, sem tsx; só @prisma/client + bcryptjs).
      # Idempotente (upsert) — cria/atualiza Agency, Empresa e Líder e nunca apaga.
      # Alternativa manual via endpoints admin (requerem Bearer token de admin):
      #   POST /api/admin/seed/agency-real | empresa-real | lider-real
      # ────────────────────────────────────────────────────────────────────────────

      - name: Reset users password on VPS
        if: ${{ env.RUN_RESET_USERS_PASSWORD == 'true' }}
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          VPS_HOST="$(echo -n "$VPS_HOST" | tr -d '[:space:]')"
          VPS_USER="$(echo -n "$VPS_USER" | tr -d '[:space:]')"
          VPS_SSH_PORT="$(echo -n "$VPS_SSH_PORT" | tr -d '[:space:]')"
          remote="${VPS_USER}@${VPS_HOST}"
          SSH_OPTS=(
            -i "$HOME/.ssh/allka_deploy_key"
            -p "$VPS_SSH_PORT"
            -o ConnectTimeout=15
            -o ConnectionAttempts=2
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          ssh "${SSH_OPTS[@]}" "$remote" \
            "cd '${VPS_DEPLOY_PATH}' && docker compose --env-file .env -f docker-compose.yml run --rm --no-deps backend npm run reset:users-password"
