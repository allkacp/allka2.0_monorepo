name: Deploy Frontend

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/frontend/**'
      - 'docker/frontend.prod.Dockerfile'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  FRONTEND_DOMAIN: allka.store
  API_DOMAIN: api.allka.store
  VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.allka.store/api' }}
  VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH || '/opt/allka-2026' }}
  VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
  MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE || 'allka' }}
  MYSQL_USER: ${{ secrets.MYSQL_USER || 'allka' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: images
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::7}"
          echo "frontend_image=${REGISTRY}/${repo}/frontend:${short_sha}" >> "$GITHUB_OUTPUT"
          echo "frontend_latest=${REGISTRY}/${repo}/frontend:dev" >> "$GITHUB_OUTPUT"
          # Backend usa sempre a tag :dev existente no GHCR
          echo "backend_image=${REGISTRY}/${repo}/backend:dev" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.prod.Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
            VITE_USE_MOCKS=false
          tags: |
            ${{ steps.images.outputs.frontend_image }}
            ${{ steps.images.outputs.frontend_latest }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Validate required deploy secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          : "${VPS_HOST:?Set the VPS_HOST secret}"
          : "${VPS_USER:?Set the VPS_USER secret}"
          : "${VPS_SSH_KEY:?Set the VPS_SSH_KEY secret}"

      - name: Render deploy files
        shell: bash
        env:
          BACKEND_IMAGE: ${{ steps.images.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend_image }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          mkdir -p .deploy/infra/caddy
          cp docker-compose.prod.yml .deploy/docker-compose.yml
          cp infra/caddy/Caddyfile .deploy/infra/caddy/Caddyfile

          {
            printf 'BACKEND_IMAGE=%s\n' "$BACKEND_IMAGE"
            printf 'FRONTEND_IMAGE=%s\n' "$FRONTEND_IMAGE"
            printf 'FRONTEND_DOMAIN=%s\n' "$FRONTEND_DOMAIN"
            printf 'API_DOMAIN=%s\n' "$API_DOMAIN"
            printf 'MYSQL_DATABASE=%s\n' "$MYSQL_DATABASE"
            printf 'MYSQL_USER=%s\n' "$MYSQL_USER"
            printf 'MYSQL_PASSWORD=%s\n' "$MYSQL_PASSWORD"
            printf 'MYSQL_ROOT_PASSWORD=%s\n' "$MYSQL_ROOT_PASSWORD"
          } > .deploy/.env

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          touch ~/.ssh/allka_deploy_key
          chmod 600 ~/.ssh/allka_deploy_key
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/allka_deploy_key
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload compose files
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          remote="${VPS_USER}@${VPS_HOST}"
          SSH_OPTS=(
            -i "$HOME/.ssh/allka_deploy_key"
            -p "$VPS_SSH_PORT"
            -o ConnectTimeout=15
            -o ConnectionAttempts=2
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          SCP_OPTS=(
            -i "$HOME/.ssh/allka_deploy_key"
            -P "$VPS_SSH_PORT"
            -o ConnectTimeout=15
            -o ConnectionAttempts=2
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          if ! ssh "${SSH_OPTS[@]}" "$remote" "true"; then
            echo "::error::SSH inacessível em ${VPS_HOST}:${VPS_SSH_PORT}. Verifique VPS_HOST, VPS_SSH_PORT, firewall e se o serviço SSH está ativo no VPS."
            exit 1
          fi
          ssh "${SSH_OPTS[@]}" "$remote" "mkdir -p '${VPS_DEPLOY_PATH}/infra/caddy'"
          scp "${SCP_OPTS[@]}" .deploy/docker-compose.yml "$remote:${VPS_DEPLOY_PATH}/docker-compose.yml"
          scp "${SCP_OPTS[@]}" .deploy/.env               "$remote:${VPS_DEPLOY_PATH}/.env"
          scp "${SCP_OPTS[@]}" .deploy/infra/caddy/Caddyfile "$remote:${VPS_DEPLOY_PATH}/infra/caddy/Caddyfile"

      - name: Deploy frontend on VPS
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
        run: |
          remote="${VPS_USER}@${VPS_HOST}"
          SSH_OPTS=(-i ~/.ssh/allka_deploy_key -p "$VPS_SSH_PORT" -o ConnectTimeout=15 -o ConnectionAttempts=2 -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          SCP_OPTS=(-i ~/.ssh/allka_deploy_key -P "$VPS_SSH_PORT" -o ConnectTimeout=15 -o ConnectionAttempts=2 -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile="$HOME/.ssh/known_hosts")
          printf '%s' "$GHCR_TOKEN" | ssh "${SSH_OPTS[@]}" "$remote" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          ssh "${SSH_OPTS[@]}" "$remote" \
            "cd '${VPS_DEPLOY_PATH}' && \
             docker compose --env-file .env -f docker-compose.yml pull frontend && \
             docker compose --env-file .env -f docker-compose.yml up -d --no-deps frontend && \
             docker compose --env-file .env -f docker-compose.yml up -d caddy && \
             docker image prune -f"
