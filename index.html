<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plataforma completa de gestão de projetos e tarefas" />
    <title>ALLKA - Plataforma de Gestão</title>
    <!-- Anti-flash: aplica a escala de fonte salva antes do primeiro render -->
    <script>
      (function () {
        var LEVELS = { min3: 0.75, min2: 0.8125, min1: 0.875, "default": 0.9375, plus1: 1.0, plus2: 1.0625, plus3: 1.125 };
        var stored = localStorage.getItem("allka_font_scale");
        var scale = LEVELS[stored] != null ? LEVELS[stored] : LEVELS["default"];
        var px = (Math.round(16 * scale * 100) / 100) + "px";
        document.documentElement.style.fontSize = px;
        document.documentElement.style.setProperty("--allka-font-scale", String(scale));
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&subset=latin,latin-ext&display=swap" rel="stylesheet" />
    <script
      src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places,geometry&language=pt-BR"
      async
      defer
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
