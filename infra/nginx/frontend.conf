server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html nunca pode ser cacheado: ele referencia os chunks com hash.
  # Se ficar em cache, após um novo deploy o navegador pede chunks antigos
  # que já não existem → "Failed to fetch dynamically imported module".
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires -1;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}