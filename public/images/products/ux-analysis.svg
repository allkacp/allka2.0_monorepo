  <rect x="561" y="226" width="8" height="8" rx="2" fill="#ef4444"/>
  <text x="576" y="234" font-family="system-ui, sans-serif" font-size="9.5" fill="#cbd5e1">Botão de contato quebrado (mobile)</text>

