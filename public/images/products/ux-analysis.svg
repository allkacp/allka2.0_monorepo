    <line x1="0" y1="270" x2="800" y2="270" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#94a3b8" stroke-width="1"/>
    <line x1="133" y1="0" x2="133" y2="450" stroke="#94a3b8" stroke-width="1"/>
    <line x1="266" y1="0" x2="266" y2="450" stroke="#94a3b8" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="#94a3b8" stroke-width="1"/>
    <line x1="533" y1="0" x2="533" y2="450" stroke="#94a3b8" stroke-width="1"/>
