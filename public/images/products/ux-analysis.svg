  <circle cx="147" cy="185" r="58" fill="none" stroke="url(#scoreGrad)" stroke-width="10" stroke-dasharray="255 108" stroke-linecap="round" transform="rotate(-90 147 185)" filter="url(#glow)"/>
  <text x="147" y="178" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#f1f5f9" text-anchor="middle">73</text>
