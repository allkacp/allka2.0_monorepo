  <text x="50" y="65" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">Análise de Usabilidade UX</text>
  <text x="570" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">RELATÓRIO</text>
  <text x="570" y="65" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#22d3ee">PA0005-REL-UX</text>
  <rect x="720" y="33" width="40" height="14" rx="7" fill="#22d3ee" opacity="0.15"/>
