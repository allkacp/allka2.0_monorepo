<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1630"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="accentTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accentTop)"/>

  <!-- Header -->
  <text x="40" y="36" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="2">ANÁLISE DE VELOCIDADE E PERFORMANCE</text>
  <text x="40" y="58" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#f1f5f9">Google PageSpeed Insights</text>
  <rect x="650" y="25" width="110" height="28" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
  <text x="705" y="44" font-family="system-ui, sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle">PA0005-REL-UX / S01</text>

  <!-- Divider -->
  <line x1="40" y1="72" x2="760" y2="72" stroke="#1e293b" stroke-width="1"/>

  <!-- LEFT — Desktop score donut -->
  <rect x="40" y="88" width="200" height="230" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="140" y="112" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">DESKTOP</text>
  
  <!-- Donut background -->
  <circle cx="140" cy="185" r="65" fill="none" stroke="#1e293b" stroke-width="14"/>
  <!-- Score arc ~81/100 = 81% of 408.4 = 330.8 -->
  <circle cx="140" cy="185" r="65" fill="none" stroke="url(#green)" stroke-width="14"
    stroke-dasharray="330 78" stroke-linecap="round" transform="rotate(-90 140 185)" filter="url(#softglow)"/>
  <text x="140" y="177" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#f1f5f9" text-anchor="middle">81</text>
  <text x="140" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">Bom</text>
  
  <rect x="55" y="262" width="170" height="46" rx="6" fill="#0f172a"/>
  <text x="65" y="278" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Tempo de carregamento</text>
  <text x="65" y="293" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e">1.8s</text>
  <text x="170" y="293" font-family="system-ui, sans-serif" font-size="9" fill="#22c55e" text-anchor="end">✓ Bom</text>
  <text x="65" y="303" font-family="system-ui, sans-serif" font-size="8.5" fill="#4b5563">referência: &lt; 2.5s</text>

  <!-- CENTER — Mobile score donut -->
  <rect x="258" y="88" width="200" height="230" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="358" y="112" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">MOBILE</text>
  
  <circle cx="358" cy="185" r="65" fill="none" stroke="#1e293b" stroke-width="14"/>
  <!-- 64/100 = 64% of 408.4 = 261.4 -->
  <circle cx="358" cy="185" r="65" fill="none" stroke="url(#amber)" stroke-width="14"
    stroke-dasharray="261 147" stroke-linecap="round" transform="rotate(-90 358 185)" filter="url(#softglow)"/>
  <text x="358" y="177" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#f1f5f9" text-anchor="middle">64</text>
  <text x="358" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Precisa melhorar</text>

  <rect x="273" y="262" width="170" height="46" rx="6" fill="#0f172a"/>
  <text x="283" y="278" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Tempo de carregamento</text>
  <text x="283" y="293" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#f59e0b">3.9s</text>
  <text x="388" y="293" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b" text-anchor="end">⚠ Lento</text>
  <text x="283" y="303" font-family="system-ui, sans-serif" font-size="8.5" fill="#4b5563">referência: &lt; 2.5s</text>

  <!-- RIGHT — Core Web Vitals grid -->
  <rect x="476" y="88" width="284" height="230" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="492" y="112" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="1">CORE WEB VITALS</text>

  <!-- LCP -->
  <rect x="492" y="122" width="120" height="58" rx="6" fill="#0f172a"/>
  <text x="552" y="140" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">LCP</text>
  <text x="552" y="162" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#f59e0b" text-anchor="middle">3.1s</text>
  <text x="552" y="175" font-family="system-ui, sans-serif" font-size="8.5" fill="#f59e0b" text-anchor="middle">⚠ Moderado</text>

  <!-- FID -->
  <rect x="622" y="122" width="120" height="58" rx="6" fill="#0f172a"/>
  <text x="682" y="140" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">FID / INP</text>
  <text x="682" y="162" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="middle">62ms</text>
  <text x="682" y="175" font-family="system-ui, sans-serif" font-size="8.5" fill="#22c55e" text-anchor="middle">✓ Bom</text>

  <!-- CLS -->
  <rect x="492" y="190" width="120" height="58" rx="6" fill="#0f172a"/>
  <text x="552" y="208" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">CLS</text>
  <text x="552" y="230" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#ef4444" text-anchor="middle">0.25</text>
  <text x="552" y="243" font-family="system-ui, sans-serif" font-size="8.5" fill="#ef4444" text-anchor="middle">✗ Ruim</text>

  <!-- TTFB -->
  <rect x="622" y="190" width="120" height="58" rx="6" fill="#0f172a"/>
  <text x="682" y="208" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">TTFB</text>
  <text x="682" y="230" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e" text-anchor="middle">0.7s</text>
  <text x="682" y="243" font-family="system-ui, sans-serif" font-size="8.5" fill="#22c55e" text-anchor="middle">✓ Bom</text>

  <!-- Bottom — Opportunities -->
  <rect x="40" y="332" width="720" height="100" rx="10" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="60" y="354" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="1">OPORTUNIDADES DE MELHORIA  (estimativa de ganho)</text>
  
  <!-- Opp 1 -->
  <rect x="60" y="364" width="8" height="8" rx="2" fill="#ef4444"/>
  <text x="76" y="372" font-family="system-ui, sans-serif" font-size="9.5" fill="#cbd5e1">Otimizar imagens — reduzir tamanho dos arquivos de imagem</text>
  <rect x="480" y="365" width="60" height="8" rx="4" fill="#1e293b"/>
  <rect x="480" y="365" width="55" height="8" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="745" y="372" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" text-anchor="end">− 1.8s</text>

  <!-- Opp 2 -->
  <rect x="60" y="384" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="76" y="392" font-family="system-ui, sans-serif" font-size="9.5" fill="#cbd5e1">Eliminar CSS e JavaScript que bloqueiam a renderização</text>
  <rect x="480" y="385" width="60" height="8" rx="4" fill="#1e293b"/>
  <rect x="480" y="385" width="38" height="8" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="745" y="392" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b" text-anchor="end">− 0.9s</text>

  <!-- Opp 3 -->
  <rect x="60" y="404" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="76" y="412" font-family="system-ui, sans-serif" font-size="9.5" fill="#cbd5e1">Ativar compressão de texto (gzip/brotli) no servidor</text>
  <rect x="480" y="405" width="60" height="8" rx="4" fill="#1e293b"/>
  <rect x="480" y="405" width="22" height="8" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="745" y="412" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b" text-anchor="end">− 0.4s</text>

  <!-- Footer -->
  <text x="40" y="443" font-family="system-ui, sans-serif" font-size="9" fill="#374151">PA0005 — Análise de Usabilidade UX  |  Análise de Velocidade</text>
  <text x="760" y="443" font-family="system-ui, sans-serif" font-size="9" fill="#374151" text-anchor="end">allka.com.br</text>
</svg>
