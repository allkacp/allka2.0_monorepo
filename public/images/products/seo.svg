<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <!-- Background gradient: dark teal → deep blue -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2340;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#0f3460;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a4a7a;stop-opacity:1"/>
    </linearGradient>
    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <!-- Ranking bar gradient -->
    <linearGradient id="rankGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rankGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rankGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="700" cy="80" r="130" fill="none" stroke="rgba(34,211,238,0.1)" stroke-width="2"/>
  <circle cx="700" cy="80" r="85" fill="none" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>
  <circle cx="100" cy="380" r="110" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="2"/>

  <!-- ── Search bar mockup ──────────────────────── -->
  <rect x="50" y="80" width="440" height="50" rx="25" ry="25" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Magnifier icon -->
  <circle cx="84" cy="105" r="10" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="91" y1="113" x2="98" y2="120" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <!-- Search text -->
  <text x="110" y="110" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">consultoria financeira para PMEs</text>
  <!-- Cursor blink -->
  <rect x="378" y="97" width="2" height="16" rx="1" fill="rgba(34,211,238,0.9)"/>

  <!-- ── SERP Results panel ──────────────────────────────────── -->
  <rect x="50" y="148" width="440" height="222" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>

  <!-- Result 1 — highlighted (TOP position) -->
  <rect x="62" y="160" width="416" height="56" rx="8" ry="8" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <!-- Position badge -->
  <rect x="70" y="170" width="22" height="22" rx="4" fill="#22d3ee" opacity="0.9"/>
  <text x="81" y="185" font-family="system-ui,sans-serif" font-size="11" fill="#0c2340" text-anchor="middle" font-weight="700">1</text>
  <text x="102" y="180" font-family="system-ui,sans-serif" font-size="12" fill="#22d3ee" font-weight="600">seusite.com.br/consultoria-financeira</text>
  <text x="102" y="197" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Consultoria financeira para pequenas e médias empresas...</text>
  <!-- Star badge -->
  <text x="440" y="183" font-family="system-ui,sans-serif" font-size="10" fill="#22d3ee" text-anchor="end">★ Top</text>

  <!-- Result 2 -->
  <rect x="62" y="224" width="416" height="46" rx="8" ry="8" fill="transparent"/>
  <rect x="70" y="232" width="22" height="22" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="81" y="247" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">2</text>
  <text x="102" y="243" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">concorrente.com/servicos</text>
  <text x="102" y="258" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.25)">Serviços de consultoria para empresas...</text>

  <!-- Result 3 -->
  <rect x="62" y="278" width="416" height="46" rx="8" ry="8" fill="transparent"/>
  <rect x="70" y="286" width="22" height="22" rx="4" fill="rgba(255,255,255,0.07)"/>
  <text x="81" y="301" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">3</text>
  <text x="102" y="297" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">outraempresa.com.br/financas</text>
  <text x="102" y="312" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">Finanças empresariais e planejamento...</text>

  <!-- Separator -->
  <line x1="70" y1="332" x2="466" y2="332" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Result hint (faded) -->
  <rect x="70" y="340" width="22" height="14" rx="3" fill="rgba(255,255,255,0.05)"/>
  <text x="81" y="350" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="middle">4</text>
  <rect x="102" y="342" width="200" height="10" rx="3" fill="rgba(255,255,255,0.07)"/>
  <rect x="102" y="356" width="140" height="8" rx="3" fill="rgba(255,255,255,0.05)"/>

  <!-- ── Right panel — keyword ranking cards ─────────────────── -->
  <!-- Card: tráfego orgânico -->
  <rect x="510" y="80" width="240" height="85" rx="12" ry="12" fill="rgba(255,255,255,0.07)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="530" y="108" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" letter-spacing="1">TRÁFEGO ORGÂNICO</text>
  <text x="530" y="140" font-family="system-ui,sans-serif" font-size="30" fill="#ffffff" font-weight="700">+68%</text>
  <polygon points="720,130 730,110 740,130" fill="#4ade80"/>
  <text x="715" y="152" font-family="system-ui,sans-serif" font-size="10" fill="#4ade80">em 90 dias</text>

  <!-- Card: keywords rankeando -->
  <rect x="510" y="178" width="240" height="85" rx="12" ry="12" fill="rgba(255,255,255,0.07)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
  <text x="530" y="206" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" letter-spacing="1">KEYWORDS TOP 10</text>
  <text x="530" y="238" font-family="system-ui,sans-serif" font-size="30" fill="#ffffff" font-weight="700">34 kws</text>
  <polygon points="720,228 730,208 740,228" fill="#4ade80"/>
  <text x="715" y="250" font-family="system-ui,sans-serif" font-size="10" fill="#4ade80">+18 este mês</text>

  <!-- Card: DA -->
  <rect x="510" y="276" width="240" height="85" rx="12" ry="12" fill="rgba(255,255,255,0.07)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <text x="530" y="304" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" letter-spacing="1">DOMAIN AUTHORITY</text>
  <text x="530" y="336" font-family="system-ui,sans-serif" font-size="30" fill="#ffffff" font-weight="700">DA 42</text>
  <polygon points="720,326 730,306 740,326" fill="#4ade80"/>
  <text x="715" y="348" font-family="system-ui,sans-serif" font-size="10" fill="#4ade80">+7 pts</text>

  <!-- ── Bottom keyword pills ──────────────────────── -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <!-- Keyword pills -->
  <rect x="50" y="413" width="100" height="24" rx="12" fill="rgba(34,211,238,0.15)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="100" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(34,211,238,0.9)" text-anchor="middle" font-weight="500">On-Page SEO</text>

  <rect x="162" y="413" width="90" height="24" rx="12" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="207" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(100,170,255,0.9)" text-anchor="middle" font-weight="500">Link Building</text>

  <rect x="264" y="413" width="90" height="24" rx="12" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="309" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(192,160,255,0.9)" text-anchor="middle" font-weight="500">Auditoria</text>

  <!-- Product name -->
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="end" font-weight="400">SEO — allka</text>

  <!-- ── Main title ──────────────────────────────────── -->
  <text x="50" y="52" font-family="system-ui, sans-serif" font-size="22" fill="#ffffff" font-weight="700">SEO — Posicionamento Orgânico</text>
  <text x="50" y="72" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="400">Estratégia técnica para crescer no Google de forma consistente</text>
</svg>
