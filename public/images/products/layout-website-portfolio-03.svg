  <!-- Badges -->
  <rect x="30" y="424" width="130" height="22" rx="11" fill="rgba(37,88,255,0.15)" stroke="rgba(37,88,255,0.35)" stroke-width="1"/>
  <text x="95" y="439" font-family="system-ui,sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="600">Alta conversão</text>
  <rect x="172" y="424" width="120" height="22" rx="11" fill="rgba(110,44,150,0.15)" stroke="rgba(110,44,150,0.35)" stroke-width="1"/>
  <text x="232" y="439" font-family="system-ui,sans-serif" font-size="10" fill="#c084fc" text-anchor="middle" font-weight="600">CTA otimizado</text>
  <rect x="304" y="424" width="130" height="22" rx="11" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="369" y="439" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" font-weight="600">Prova social</text>
</svg>
