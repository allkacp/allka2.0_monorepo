<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285f4"/>
      <stop offset="100%" style="stop-color:#34a853"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbc04"/>
      <stop offset="100%" style="stop-color:#ea4335"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="720" cy="80" r="130" fill="#4285f4" fill-opacity="0.04"/>

  <!-- Header -->
  <rect x="30" y="22" width="200" height="26" rx="6" fill="#ffffff12"/>
  <text x="42" y="39" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="600" letter-spacing="1">INSIGHTS DO NEGÓCIO</text>
  <text x="30" y="78" font-family="system-ui,sans-serif" font-size="26" fill="#ffffff" font-weight="700">Visibilidade no Google</text>
  <text x="30" y="100" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">Buscas, visualizações e ações dos usuários · últimos 30 dias</text>
  <line x1="30" y1="116" x2="770" y2="116" stroke="#ffffff15" stroke-width="1"/>

  <!-- KPI Cards -->
  <!-- Card 1: Buscas -->
  <rect x="30" y="134" width="170" height="90" rx="12" fill="rgba(66,133,244,0.1)" stroke="rgba(66,133,244,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="162" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">BUSCAS</text>
  <text x="50" y="196" font-family="system-ui,sans-serif" font-size="30" fill="#4285f4" font-weight="800" filter="url(#glow)">2.847</text>
  <text x="50" y="215" font-family="system-ui,sans-serif" font-size="11" fill="#34a853">↑ +18% vs anterior</text>

  <!-- Card 2: Visualizações -->
  <rect x="215" y="134" width="170" height="90" rx="12" fill="rgba(52,168,83,0.1)" stroke="rgba(52,168,83,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="235" y="162" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">VISUALIZAÇÕES</text>
  <text x="235" y="196" font-family="system-ui,sans-serif" font-size="30" fill="#34a853" font-weight="800" filter="url(#glow)">4.193</text>
  <text x="235" y="215" font-family="system-ui,sans-serif" font-size="11" fill="#34a853">↑ +24% vs anterior</text>

  <!-- Card 3: Cliques -->
  <rect x="400" y="134" width="170" height="90" rx="12" fill="rgba(251,188,4,0.1)" stroke="rgba(251,188,4,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="420" y="162" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">CLIQUES NO SITE</text>
  <text x="420" y="196" font-family="system-ui,sans-serif" font-size="30" fill="#fbbc04" font-weight="800" filter="url(#glow)">312</text>
  <text x="420" y="215" font-family="system-ui,sans-serif" font-size="11" fill="#34a853">↑ +31% vs anterior</text>

  <!-- Card 4: Ligações -->
  <rect x="585" y="134" width="185" height="90" rx="12" fill="rgba(234,67,53,0.1)" stroke="rgba(234,67,53,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="605" y="162" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">LIGAÇÕES</text>
  <text x="605" y="196" font-family="system-ui,sans-serif" font-size="30" fill="#ea4335" font-weight="800" filter="url(#glow)">89</text>
  <text x="605" y="215" font-family="system-ui,sans-serif" font-size="11" fill="#34a853">↑ +12% vs anterior</text>

  <!-- Chart area -->
  <rect x="30" y="242" width="740" height="160" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="50" y="264" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" font-weight="600">EVOLUÇÃO DE BUSCAS E VISUALIZAÇÕES · ÚLTIMAS 4 SEMANAS</text>

  <!-- Grid lines -->
  <g opacity="0.1" stroke="#ffffff" stroke-width="1">
    <line x1="50" y1="280" x2="755" y2="280"/>
    <line x1="50" y1="310" x2="755" y2="310"/>
    <line x1="50" y1="340" x2="755" y2="340"/>
    <line x1="50" y1="370" x2="755" y2="370"/>
  </g>

  <!-- Buscas line (blue) -->
  <polyline points="80,358 250,340 430,315 600,282 760,268"
    fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Points -->
  <circle cx="80"  cy="358" r="5" fill="#4285f4"/>
  <circle cx="250" cy="340" r="5" fill="#4285f4"/>
  <circle cx="430" cy="315" r="5" fill="#4285f4"/>
  <circle cx="600" cy="282" r="5" fill="#34a853"/>
  <circle cx="760" cy="268" r="5" fill="#34a853"/>

  <!-- Visualizações line (yellow) -->
  <polyline points="80,372 250,360 430,345 600,320 760,294"
    fill="none" stroke="url(#lineGrad2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" stroke-dasharray="6,3"/>
  <circle cx="80"  cy="372" r="4" fill="#fbbc04"/>
  <circle cx="250" cy="360" r="4" fill="#fbbc04"/>
  <circle cx="430" cy="345" r="4" fill="#fbbc04"/>
  <circle cx="600" cy="320" r="4" fill="#fbbc04"/>
  <circle cx="760" cy="294" r="4" fill="#ea4335"/>

  <!-- Week labels -->
  <text x="80"  y="398" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">Sem 1</text>
  <text x="250" y="398" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">Sem 2</text>
  <text x="430" y="398" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">Sem 3</text>
  <text x="600" y="398" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">Sem 4</text>

  <!-- Legend -->
  <rect x="620" y="270" width="10" height="3" rx="2" fill="#4285f4"/>
  <text x="636" y="275" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Buscas</text>
  <rect x="620" y="286" width="10" height="3" rx="2" fill="#fbbc04"/>
  <text x="636" y="291" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Visualizações</text>

  <text x="400" y="430" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.25)" text-anchor="end">Google Negócios Insights · allka</text>
</svg>
