  <text x="85" y="222" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Sem instalar software</text>
  <text x="70" y="240" font-family="system-ui,sans-serif" font-size="10" fill="rgba(74,222,128,0.8)">✓</text>
  <text x="85" y="240" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Disponível 10 dias</text>
  <text x="70" y="258" font-family="system-ui,sans-serif" font-size="10" fill="rgba(74,222,128,0.8)">✓</text>
  <text x="85" y="258" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Exporta em PDF / PNG</text>
  <text x="70" y="276" font-family="system-ui,sans-serif" font-size="10" fill="rgba(74,222,128,0.8)">✓</text>
