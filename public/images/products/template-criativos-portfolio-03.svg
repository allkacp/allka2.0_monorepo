  <text x="564" y="183" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">template_01_feed.png</text>
  <text x="564" y="197" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">template_02_stories.png</text>
  <text x="564" y="211" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">template_03_linkedin.png</text>
