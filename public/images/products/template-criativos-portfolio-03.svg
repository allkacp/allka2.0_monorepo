  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <rect x="50" y="414" width="160" height="22" rx="11" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <text x="130" y="429" font-family="system-ui,sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">Entrega em 4 dias úteis ✓</text>
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="end">Template para Criativos — allka</text>
