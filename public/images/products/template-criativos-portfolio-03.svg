  <text x="310" y="181" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.55)">template_02.ai</text>
  <text x="310" y="199" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.55)">template_03.psd</text>
  <text x="310" y="217" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.55)">template_04.ai</text>
  <text x="310" y="235" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.55)">template_05.psd</text>
