  <rect x="608" y="304" width="50" height="22" rx="11" fill="rgba(251,191,36,0.2)"/>
  <text x="633" y="319" font-family="system-ui,sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">.zip</text>

  <!-- Delivery badge bottom -->
