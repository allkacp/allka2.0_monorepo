  <rect x="44" y="88" width="220" height="280" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1" filter="url(#shadow)"/>
  <rect x="44" y="88" width="220" height="42" rx="14" fill="rgba(59,130,246,0.18)"/>
