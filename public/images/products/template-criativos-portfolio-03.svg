  <text x="561" y="255" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Alta resolução (300dpi)</text>
  <text x="546" y="273" font-family="system-ui,sans-serif" font-size="10" fill="rgba(74,222,128,0.8)">✓</text>
  <text x="561" y="273" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Pronto para publicar</text>
  <text x="546" y="291" font-family="system-ui,sans-serif" font-size="10" fill="rgba(74,222,128,0.8)">✓</text>
  <text x="561" y="291" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Fundo transparente ou sólido</text>
