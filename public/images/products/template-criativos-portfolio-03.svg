  <text x="325" y="262" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Camadas organizadas</text>
  <text x="310" y="280" font-family="system-ui,sans-serif" font-size="10" fill="rgba(74,222,128,0.8)">✓</text>
  <text x="325" y="280" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Edição profissional</text>
  <text x="310" y="298" font-family="system-ui,sans-serif" font-size="10" fill="rgba(74,222,128,0.8)">✓</text>
  <text x="325" y="298" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Vetores escaláveis</text>
