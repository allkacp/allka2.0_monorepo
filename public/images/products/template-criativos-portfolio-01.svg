<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b1850;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Title -->
  <text x="50" y="48" font-family="system-ui,sans-serif" font-size="22" fill="#ffffff" font-weight="700">Sua marca em cada template</text>
  <text x="50" y="70" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">Antes e depois — identidade visual aplicada</text>

  <!-- Divider label -->
  <text x="400" y="105" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="2">ANTES</text>
  <line x1="50" y1="110" x2="370" y2="110" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="400" y="115" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">✦</text>
  <line x1="430" y1="110" x2="750" y2="110" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="400" y="130" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="2">DEPOIS</text>

  <!-- BEFORE: generic template -->
  <rect x="44" y="138" width="340" height="195" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <!-- Generic template mockup -->
  <rect x="60" y="154" width="308" height="60" rx="6" fill="rgba(255,255,255,0.06)"/>
  <rect x="75" y="164" width="80" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="75" y="180" width="130" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="280" y="159" width="70" height="45" rx="6" fill="rgba(255,255,255,0.08)"/>
  <text x="315" y="186" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="middle">Logo</text>
  <!-- Generic body -->
  <rect x="60" y="224" width="308" height="90" rx="6" fill="rgba(255,255,255,0.03)"/>
  <rect x="75" y="234" width="200" height="8" rx="3" fill="rgba(255,255,255,0.07)"/>
  <rect x="75" y="248" width="160" height="8" rx="3" fill="rgba(255,255,255,0.05)"/>
  <rect x="75" y="262" width="180" height="8" rx="3" fill="rgba(255,255,255,0.05)"/>
  <rect x="75" y="283" width="100" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
  <text x="125" y="298" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="middle">Botão genérico</text>
  <!-- Label -->
  <rect x="60" y="338" width="160" height="22" rx="11" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="140" y="352" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">Template sem identidade</text>

  <!-- Arrow -->
  <text x="400" y="248" font-family="system-ui,sans-serif" font-size="28" fill="rgba(255,255,255,0.25)" text-anchor="middle">→</text>

  <!-- AFTER: branded template -->
  <rect x="416" y="138" width="340" height="195" rx="12" fill="rgba(200,26,127,0.1)" stroke="rgba(200,26,127,0.3)" stroke-width="1" filter="url(#shadow)"/>
  <!-- Branded header bar -->
  <rect x="432" y="154" width="308" height="60" rx="6" fill="rgba(200,26,127,0.2)"/>
  <rect x="447" y="164" width="80" height="10" rx="3" fill="rgba(255,255,255,0.7)"/>
  <rect x="447" y="180" width="130" height="6" rx="3" fill="rgba(255,255,255,0.35)"/>
  <!-- Brand logo placeholder styled -->
  <rect x="652" y="159" width="70" height="45" rx="6" fill="rgba(200,26,127,0.4)"/>
  <text x="687" y="183" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-weight="700">MARCA</text>
  <text x="687" y="196" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">logotipo</text>
  <!-- Branded body -->
  <rect x="432" y="224" width="308" height="90" rx="6" fill="rgba(255,255,255,0.04)"/>
  <rect x="447" y="234" width="200" height="8" rx="3" fill="rgba(255,255,255,0.55)"/>
  <rect x="447" y="248" width="160" height="8" rx="3" fill="rgba(255,255,255,0.35)"/>
  <rect x="447" y="262" width="180" height="8" rx="3" fill="rgba(255,255,255,0.35)"/>
  <rect x="447" y="283" width="110" height="22" rx="11" fill="rgba(200,26,127,0.6)"/>
  <text x="502" y="298" font-family="system-ui,sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Saiba mais →</text>
  <!-- Color accent stripe -->
  <rect x="416" y="325" width="340" height="4" rx="2" fill="rgba(200,26,127,0.5)"/>
  <!-- Label -->
  <rect x="432" y="338" width="160" height="22" rx="11" fill="rgba(200,26,127,0.2)" stroke="rgba(200,26,127,0.4)" stroke-width="1"/>
  <text x="512" y="352" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Com identidade da marca ✓</text>

  <!-- Bottom bar -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <text x="50" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">5 templates com cores, tipografia e logo da sua marca</text>
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="end">Portfolio — allka</text>
</svg>
