<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3e"/>
      <stop offset="60%" style="stop-color:#1a2a5e"/>
      <stop offset="100%" style="stop-color:#2d1a5e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="rgba(0,0,0,0.65)"/></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="700" cy="60" r="130" fill="rgba(201,168,76,0.04)" stroke="rgba(201,168,76,0.07)" stroke-width="1.5"/>

  <rect x="30" y="22" width="175" height="24" rx="6" fill="#ffffff10"/>
  <text x="42" y="38" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="1">PAPEL TIMBRADO</text>
  <text x="30" y="72" font-family="system-ui,sans-serif" font-size="24" fill="#ffffff" font-weight="700">Papel Timbrado Corporativo</text>
  <text x="30" y="94" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">Layout A4 com identidade visual e rodapé institucional</text>
  <line x1="30" y1="110" x2="770" y2="110" stroke="#ffffff12" stroke-width="1"/>

  <!-- Document sheet (perspective slight tilt) -->
  <g filter="url(#shadow)" transform="rotate(-2, 400, 280)">
    <!-- Sheet background -->
    <rect x="220" y="128" width="360" height="270" rx="4" fill="#f9f8f4"/>
    <!-- Header band -->
    <rect x="220" y="128" width="360" height="52" rx="4" fill="url(#gold)"/>
    <rect x="220" y="166" width="360" height="14" rx="0" fill="url(#gold)" opacity="0.7"/>
    <!-- Logo mark -->
    <circle cx="252" cy="152" r="16" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text x="252" y="157" font-family="system-ui,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="900">A</text>
    <!-- Company name in header -->
    <text x="278" y="148" font-family="system-ui,sans-serif" font-size="14" fill="#fff" font-weight="700">Empresa Exemplo</text>
    <text x="278" y="162" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.75)" letter-spacing="0.5">CNPJ 00.000.000/0001-00 · São Paulo, SP</text>
    <!-- Document title area -->
    <rect x="235" y="194" width="180" height="8" rx="3" fill="#c9a84c" opacity="0.35"/>
    <!-- Body text lines -->
    <rect x="235" y="212" width="330" height="5" rx="2" fill="#ccc5b0"/>
    <rect x="235" y="222" width="310" height="4" rx="2" fill="#ccc5b0"/>
    <rect x="235" y="232" width="325" height="4" rx="2" fill="#ccc5b0"/>
    <rect x="235" y="246" width="330" height="4" rx="2" fill="#ccc5b0"/>
    <rect x="235" y="256" width="280" height="4" rx="2" fill="#ccc5b0"/>
    <rect x="235" y="270" width="330" height="4" rx="2" fill="#ccc5b0"/>
    <rect x="235" y="280" width="295" height="4" rx="2" fill="#ccc5b0"/>
    <rect x="235" y="294" width="315" height="4" rx="2" fill="#ccc5b0"/>
    <rect x="235" y="304" width="260" height="4" rx="2" fill="#ccc5b0"/>
    <!-- Footer band -->
    <rect x="220" y="364" width="360" height="34" rx="0" fill="#1a1a2e" opacity="0.88"/>
    <rect x="235" y="374" width="80" height="3" rx="1.5" fill="rgba(201,168,76,0.6)"/>
    <rect x="335" y="374" width="60" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
    <rect x="415" y="374" width="80" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>
    <rect x="235" y="381" width="120" height="2" rx="1" fill="rgba(255,255,255,0.12)"/>
  </g>

  <!-- Badges -->
  <rect x="30" y="368" width="110" height="26" rx="13" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
  <text x="85" y="385" font-family="system-ui,sans-serif" font-size="11" fill="#c9a84c" text-anchor="middle" font-weight="600">Formato A4</text>
  <rect x="152" y="368" width="120" height="26" rx="13" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.35)" stroke-width="1"/>
  <text x="212" y="385" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">PDF para impressão</text>
  <rect x="284" y="368" width="130" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="349" y="385" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">Identidade visual</text>
</svg>
