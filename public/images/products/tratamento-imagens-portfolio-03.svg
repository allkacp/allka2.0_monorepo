  <text x="260" y="338" font-family="system-ui,sans-serif" font-size="11" fill="rgba(74,222,128,0.9)">✓</text>
  <text x="276" y="338" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Ruído reduzido</text>
  <text x="64" y="358" font-family="system-ui,sans-serif" font-size="11" fill="rgba(74,222,128,0.9)">✓</text>
  <text x="80" y="358" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Imperfeições removidas</text>
  <text x="260" y="358" font-family="system-ui,sans-serif" font-size="11" fill="rgba(74,222,128,0.9)">✓</text>
  <text x="276" y="358" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Nitidez e saturação ajustadas</text>

