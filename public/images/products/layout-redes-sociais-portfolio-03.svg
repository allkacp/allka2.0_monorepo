<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1145;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a1a5e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c81a7f"/>
      <stop offset="100%" style="stop-color:#7b1850"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Title -->
  <text x="50" y="48" font-family="system-ui,sans-serif" font-size="22" fill="#ffffff" font-weight="700">Layout de Redes Sociais</text>
  <text x="50" y="70" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">Processo de entrega</text>

  <!-- Step 1 -->
  <rect x="44" y="90" width="210" height="280" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="64" cy="110" r="14" fill="url(#pink)"/>
  <text x="64" y="115" font-family="system-ui,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">1</text>
  <text x="88" y="115" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" font-weight="600">Briefing</text>
  <rect x="60" y="132" width="178" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="60" y="155" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Redes selecionadas</text>
  <text x="60" y="173" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Identidade visual</text>
  <text x="60" y="191" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Logotipo em alta</text>
  <text x="60" y="209" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Referências</text>
  <text x="60" y="227" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Cores e fontes</text>

  <!-- Step 2 -->
  <rect x="295" y="90" width="210" height="280" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="315" cy="110" r="14" fill="rgba(200,26,127,0.5)" stroke="rgba(200,26,127,0.6)" stroke-width="1.5"/>
  <text x="315" y="115" font-family="system-ui,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">2</text>
  <text x="339" y="115" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" font-weight="600">Criação</text>
  <rect x="311" y="132" width="178" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="311" y="155" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Design da capa</text>
  <text x="311" y="173" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Foto de perfil</text>
  <text x="311" y="191" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Coerência visual</text>
  <text x="311" y="209" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Medidas exatas</text>
  <text x="311" y="227" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Alta resolução</text>
  <!-- Mini mockup -->
  <rect x="311" y="250" width="178" height="80" rx="6" fill="rgba(200,26,127,0.1)" stroke="rgba(200,26,127,0.2)" stroke-width="1"/>
  <rect x="311" y="250" width="178" height="40" fill="rgba(200,26,127,0.2)"/>
  <circle cx="340" cy="300" r="16" fill="#1e1145" stroke="rgba(200,26,127,0.5)" stroke-width="2"/>
  <text x="340" y="306" font-family="system-ui,sans-serif" font-size="10" fill="#c81a7f" text-anchor="middle" font-weight="700">BN</text>
  <rect x="365" y="294" width="80" height="7" rx="3" fill="rgba(255,255,255,0.4)"/>
  <rect x="365" y="308" width="55" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- Step 3 -->
  <rect x="546" y="90" width="210" height="280" rx="12" fill="rgba(74,222,128,0.05)" stroke="rgba(74,222,128,0.15)" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="566" cy="110" r="14" fill="rgba(74,222,128,0.25)" stroke="rgba(74,222,128,0.5)" stroke-width="1.5"/>
  <text x="566" y="115" font-family="system-ui,sans-serif" font-size="12" fill="#4ade80" text-anchor="middle" font-weight="700">3</text>
  <text x="590" y="115" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" font-weight="600">Entrega</text>
  <rect x="562" y="132" width="178" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="562" y="155" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· .PSD para edição</text>
  <text x="562" y="173" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· .PNG final exportado</text>
  <text x="562" y="191" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Mockup visual</text>
  <text x="562" y="209" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Em até 2 dias úteis</text>
  <text x="562" y="227" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">· Aprovação inclusa</text>
  <!-- Delivery badge -->
  <rect x="562" y="298" width="178" height="42" rx="8" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="651" y="314" font-family="system-ui,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="600">✓ Aprovado</text>
  <text x="651" y="332" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">em 2 dias úteis</text>

  <!-- Connecting arrows -->
  <text x="276" y="235" font-family="system-ui,sans-serif" font-size="20" fill="rgba(200,26,127,0.5)" text-anchor="middle">›</text>
  <text x="527" y="235" font-family="system-ui,sans-serif" font-size="20" fill="rgba(74,222,128,0.5)" text-anchor="middle">›</text>

  <!-- Bottom bar -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="end">Layout de Redes Sociais — allka</text>
</svg>
