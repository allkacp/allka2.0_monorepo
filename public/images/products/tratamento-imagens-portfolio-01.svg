<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1145;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c81a7f"/>
      <stop offset="100%" style="stop-color:#7b1850"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Title -->
  <text x="50" y="48" font-family="system-ui,sans-serif" font-size="22" fill="#ffffff" font-weight="700">Tratamento de até 10 Imagens</text>
  <text x="50" y="70" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">Ajustes aplicados — detalhamento técnico</text>

  <!-- Adjustment panel: histogram style -->
  <rect x="44" y="88" width="360" height="290" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <text x="64" y="114" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1.5">HISTOGRAMA DE CORES</text>

  <!-- Histogram bars - RGB channels -->
  <text x="64" y="138" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">Antes</text>
  <!-- Before histogram (dark, uneven) -->
  <g opacity="0.6">
    <rect x="64" y="145" width="8" height="40" fill="rgba(248,113,113,0.5)" rx="2"/>
    <rect x="74" y="155" width="8" height="30" fill="rgba(248,113,113,0.5)" rx="2"/>
    <rect x="84" y="150" width="8" height="35" fill="rgba(248,113,113,0.5)" rx="2"/>
    <rect x="94" y="160" width="8" height="25" fill="rgba(74,222,128,0.5)" rx="2"/>
    <rect x="104" y="155" width="8" height="30" fill="rgba(74,222,128,0.5)" rx="2"/>
    <rect x="114" y="165" width="8" height="20" fill="rgba(74,222,128,0.5)" rx="2"/>
    <rect x="124" y="158" width="8" height="27" fill="rgba(96,165,250,0.5)" rx="2"/>
    <rect x="134" y="162" width="8" height="23" fill="rgba(96,165,250,0.5)" rx="2"/>
    <rect x="144" y="157" width="8" height="28" fill="rgba(96,165,250,0.5)" rx="2"/>
  </g>
  <line x1="64" y1="190" x2="380" y2="190" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <text x="64" y="212" font-family="system-ui,sans-serif" font-size="10" fill="#14b8a6">Depois</text>
  <!-- After histogram (balanced, brighter) -->
  <g opacity="0.85">
    <rect x="64" y="218" width="8" height="55" fill="rgba(248,113,113,0.7)" rx="2"/>
    <rect x="74" y="210" width="8" height="63" fill="rgba(248,113,113,0.7)" rx="2"/>
    <rect x="84" y="205" width="8" height="68" fill="rgba(248,113,113,0.8)" rx="2"/>
    <rect x="94" y="215" width="8" height="58" fill="rgba(74,222,128,0.7)" rx="2"/>
    <rect x="104" y="207" width="8" height="66" fill="rgba(74,222,128,0.8)" rx="2"/>
    <rect x="114" y="212" width="8" height="61" fill="rgba(74,222,128,0.7)" rx="2"/>
    <rect x="124" y="205" width="8" height="68" fill="rgba(96,165,250,0.7)" rx="2"/>
    <rect x="134" y="210" width="8" height="63" fill="rgba(96,165,250,0.8)" rx="2"/>
    <rect x="144" y="208" width="8" height="65" fill="rgba(96,165,250,0.7)" rx="2"/>
  </g>
  <line x1="64" y1="285" x2="380" y2="285" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Legend -->
  <circle cx="170" cy="315" r="5" fill="rgba(248,113,113,0.7)"/>
  <text x="180" y="319" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">R</text>
  <circle cx="200" cy="315" r="5" fill="rgba(74,222,128,0.7)"/>
  <text x="210" y="319" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">G</text>
  <circle cx="230" cy="315" r="5" fill="rgba(96,165,250,0.7)"/>
  <text x="240" y="319" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">B</text>
  <text x="64" y="355" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Equilíbrio de canais: corrigido ✓</text>
  <text x="64" y="372" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Faixa dinâmica: expandida ✓</text>

  <!-- Right panel: adjustments checklist -->
  <rect x="430" y="88" width="325" height="290" rx="12" fill="rgba(20,184,166,0.05)" stroke="rgba(20,184,166,0.15)" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="114" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1.5">AJUSTES APLICADOS</text>
  <rect x="450" y="122" width="285" height="1" fill="rgba(255,255,255,0.07)"/>

  <!-- Adjustment items with before/after values -->
  <text x="450" y="144" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" font-weight="600">Exposição</text>
  <rect x="550" y="133" width="150" height="16" rx="8" fill="rgba(255,255,255,0.06)"/>
  <rect x="550" y="133" width="110" height="16" rx="8" fill="rgba(20,184,166,0.35)"/>
  <text x="710" y="144" font-family="system-ui,sans-serif" font-size="10" fill="#14b8a6" text-anchor="end">+1.2 EV</text>

  <text x="450" y="168" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" font-weight="600">Contraste</text>
  <rect x="550" y="157" width="150" height="16" rx="8" fill="rgba(255,255,255,0.06)"/>
  <rect x="550" y="157" width="95" height="16" rx="8" fill="rgba(20,184,166,0.3)"/>
  <text x="710" y="168" font-family="system-ui,sans-serif" font-size="10" fill="#14b8a6" text-anchor="end">+18</text>

  <text x="450" y="192" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" font-weight="600">Nitidez</text>
  <rect x="550" y="181" width="150" height="16" rx="8" fill="rgba(255,255,255,0.06)"/>
  <rect x="550" y="181" width="120" height="16" rx="8" fill="rgba(20,184,166,0.3)"/>
  <text x="710" y="192" font-family="system-ui,sans-serif" font-size="10" fill="#14b8a6" text-anchor="end">+45 px</text>

  <text x="450" y="216" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" font-weight="600">Saturação</text>
  <rect x="550" y="205" width="150" height="16" rx="8" fill="rgba(255,255,255,0.06)"/>
  <rect x="550" y="205" width="100" height="16" rx="8" fill="rgba(20,184,166,0.3)"/>
  <text x="710" y="216" font-family="system-ui,sans-serif" font-size="10" fill="#14b8a6" text-anchor="end">+22</text>

  <text x="450" y="240" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" font-weight="600">Redução de ruído</text>
  <rect x="550" y="229" width="150" height="16" rx="8" fill="rgba(255,255,255,0.06)"/>
  <rect x="550" y="229" width="130" height="16" rx="8" fill="rgba(20,184,166,0.3)"/>
  <text x="710" y="240" font-family="system-ui,sans-serif" font-size="10" fill="#14b8a6" text-anchor="end">Luminância +40</text>

  <text x="450" y="264" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" font-weight="600">Correção de pele</text>
  <rect x="550" y="253" width="150" height="16" rx="8" fill="rgba(255,255,255,0.06)"/>
  <rect x="550" y="253" width="85" height="16" rx="8" fill="rgba(20,184,166,0.3)"/>
  <text x="710" y="264" font-family="system-ui,sans-serif" font-size="10" fill="#14b8a6" text-anchor="end">Healing brush</text>

  <!-- File output -->
  <rect x="450" y="298" width="285" height="62" rx="8" fill="rgba(20,184,166,0.08)" stroke="rgba(20,184,166,0.2)" stroke-width="1"/>
  <text x="468" y="316" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">FORMATOS DE SAÍDA</text>
  <text x="468" y="336" font-family="system-ui,sans-serif" font-size="12" fill="#14b8a6" font-weight="600">.PNG  ·  .PSD  ·  .XMP</text>
  <text x="468" y="352" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)">alta resolução · arquivo aberto · preset Lightroom</text>

  <!-- Bottom bar -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.25)"/>
  <text x="750" y="429" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="end">Tratamento de Imagens — allka</text>
</svg>
