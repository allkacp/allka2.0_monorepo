<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1640"/>
      <stop offset="55%" style="stop-color:#14205e"/>
      <stop offset="100%" style="stop-color:#1e0e5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2558FF"/>
      <stop offset="100%" style="stop-color:#6E2C96"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.6)"/></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="700" cy="60" r="130" fill="rgba(37,88,255,0.05)" stroke="rgba(37,88,255,0.07)" stroke-width="1.5"/>

  <rect x="30" y="22" width="155" height="24" rx="6" fill="#ffffff10"/>
  <text x="42" y="38" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="1">WIREFRAME DESKTOP</text>
  <text x="30" y="72" font-family="system-ui,sans-serif" font-size="24" fill="#ffffff" font-weight="700">Wireframe de Alta Fidelidade</text>
  <text x="30" y="94" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">Estrutura completa das páginas antes do desenvolvimento</text>
  <line x1="30" y1="110" x2="770" y2="110" stroke="#ffffff12" stroke-width="1"/>

  <!-- Wireframe grid -->
  <g filter="url(#shadow)">
    <!-- Outer frame -->
    <rect x="60" y="130" width="680" height="280" rx="6" fill="#0d1228" stroke="#ffffff14" stroke-width="1"/>
    <!-- Nav bar wireframe -->
    <rect x="60" y="130" width="680" height="36" rx="6" fill="#ffffff08" stroke="#ffffff12" stroke-width="0.5"/>
    <rect x="76" y="141" width="60" height="14" rx="3" fill="#ffffff14" stroke="#ffffff20" stroke-width="0.8"/>
    <rect x="380" y="143" width="44" height="10" rx="2" fill="#ffffff08" stroke="#ffffff15" stroke-width="0.5"/>
    <rect x="434" y="143" width="44" height="10" rx="2" fill="#ffffff08" stroke="#ffffff15" stroke-width="0.5"/>
    <rect x="488" y="143" width="44" height="10" rx="2" fill="#ffffff08" stroke="#ffffff15" stroke-width="0.5"/>
    <rect x="560" y="139" width="60" height="18" rx="9" fill="url(#accent)" opacity="0.5" stroke="rgba(37,88,255,0.5)" stroke-width="0.8"/>
    <text x="590" y="151" font-family="system-ui,sans-serif" font-size="8" fill="#aaa" text-anchor="middle">CTA</text>
    <!-- Hero section wireframe -->
    <rect x="70" y="178" width="340" height="110" rx="4" fill="#ffffff05" stroke="#ffffff12" stroke-width="0.8" stroke-dasharray="4,3"/>
    <text x="240" y="200" font-family="system-ui,sans-serif" font-size="9" fill="#4b5563" text-anchor="middle">H1 · TÍTULO PRINCIPAL</text>
    <rect x="90" y="208" width="200" height="6" rx="2" fill="#ffffff10"/>
    <rect x="90" y="218" width="160" height="6" rx="2" fill="#ffffff08"/>
    <rect x="90" y="232" width="80" height="20" rx="10" fill="#ffffff12" stroke="#ffffff20" stroke-width="0.8"/>
    <rect x="178" y="232" width="80" height="20" rx="10" fill="url(#accent)" opacity="0.25" stroke="rgba(37,88,255,0.4)" stroke-width="0.8"/>
    <!-- Hero image placeholder wireframe -->
    <rect x="430" y="178" width="300" height="110" rx="4" fill="#ffffff05" stroke="#ffffff12" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="430" y1="178" x2="730" y2="288" stroke="#ffffff08" stroke-width="0.8"/>
    <line x1="730" y1="178" x2="430" y2="288" stroke="#ffffff08" stroke-width="0.8"/>
    <text x="580" y="236" font-family="system-ui,sans-serif" font-size="9" fill="#4b5563" text-anchor="middle">IMAGEM HERO</text>
    <!-- Feature cards wireframe row -->
    <rect x="70" y="302" width="200" height="72" rx="4" fill="#ffffff04" stroke="#ffffff10" stroke-width="0.8" stroke-dasharray="3,2"/>
    <rect x="292" y="302" width="200" height="72" rx="4" fill="#ffffff04" stroke="#ffffff10" stroke-width="0.8" stroke-dasharray="3,2"/>
    <rect x="514" y="302" width="200" height="72" rx="4" fill="#ffffff04" stroke="#ffffff10" stroke-width="0.8" stroke-dasharray="3,2"/>
    <!-- Icon + text in cards -->
    <rect x="84" y="316" width="24" height="24" rx="4" fill="#ffffff10" stroke="#ffffff18" stroke-width="0.6"/>
    <rect x="116" y="318" width="100" height="6" rx="2" fill="#ffffff12"/>
    <rect x="84" y="346" width="170" height="4" rx="2" fill="#ffffff08"/>
    <rect x="84" y="354" width="140" height="4" rx="2" fill="#ffffff06"/>
    <rect x="306" y="316" width="24" height="24" rx="4" fill="#ffffff10" stroke="#ffffff18" stroke-width="0.6"/>
    <rect x="338" y="318" width="100" height="6" rx="2" fill="#ffffff12"/>
    <rect x="306" y="346" width="170" height="4" rx="2" fill="#ffffff08"/>
    <rect x="306" y="354" width="140" height="4" rx="2" fill="#ffffff06"/>
    <rect x="528" y="316" width="24" height="24" rx="4" fill="#ffffff10" stroke="#ffffff18" stroke-width="0.6"/>
    <rect x="560" y="318" width="100" height="6" rx="2" fill="#ffffff12"/>
    <rect x="528" y="346" width="170" height="4" rx="2" fill="#ffffff08"/>
    <rect x="528" y="354" width="140" height="4" rx="2" fill="#ffffff06"/>
    <!-- Footer strip wireframe -->
    <rect x="60" y="386" width="680" height="24" rx="0" fill="#ffffff05" stroke="#ffffff08" stroke-width="0.5"/>
    <rect x="76" y="394" width="60" height="5" rx="2" fill="#ffffff12"/>
    <rect x="600" y="394" width="40" height="5" rx="2" fill="#ffffff08"/>
    <rect x="648" y="394" width="40" height="5" rx="2" fill="#ffffff08"/>
    <rect x="696" y="394" width="30" height="5" rx="2" fill="#ffffff08"/>
  </g>

  <!-- Annotation labels -->
  <rect x="30" y="168" width="26" height="16" rx="3" fill="rgba(37,88,255,0.6)"/>
  <text x="43" y="180" font-family="system-ui,sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">01</text>
  <rect x="30" y="296" width="26" height="16" rx="3" fill="rgba(110,44,150,0.6)"/>
  <text x="43" y="308" font-family="system-ui,sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">02</text>

  <!-- Badges -->
  <rect x="30" y="424" width="110" height="22" rx="11" fill="rgba(37,88,255,0.15)" stroke="rgba(37,88,255,0.35)" stroke-width="1"/>
  <text x="85" y="439" font-family="system-ui,sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="600">Alta fidelidade</text>
  <rect x="152" y="424" width="120" height="22" rx="11" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="212" y="439" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" font-weight="600">Estrutura completa</text>
</svg>
