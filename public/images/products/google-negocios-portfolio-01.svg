  <circle cx="700" cy="260" r="80" fill="none" stroke="#34a853" stroke-width="14" stroke-dasharray="472" stroke-dashoffset="47" stroke-linecap="round" transform="rotate(-90 700 260)" opacity="0.9"/>
  <text x="700" y="254" font-family="system-ui,sans-serif" font-size="32" fill="#4ade80" text-anchor="middle" font-weight="800">90%</text>
  <text x="700" y="278" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">completo</text>

